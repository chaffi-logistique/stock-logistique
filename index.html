<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stock-Logistique</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js" defer></script>
<style>
:root {
  --bg:#f4f5f7;--surface:#fff;--surface2:#f1f3f5;--surface3:#e9ecef;
  --border:#dee2e6;--border2:#ced4da;
  --text:#1a1d23;--text2:#495057;--muted:#868e96;
  --acc:#2563eb;--acc-light:#eff6ff;--acc-dark:#1d4ed8;
  --green:#16a34a;--green-light:#f0fdf4;--green-border:#86efac;
  --red:#dc2626;--red-light:#fef2f2;--red-border:#fca5a5;
  --orange:#ea580c;--orange-light:#fff7ed;--orange-border:#fdba74;
  --yellow:#ca8a04;--yellow-light:#fefce8;
  --mono:"JetBrains Mono",monospace;--sans:"Inter",sans-serif;
  --radius:8px;--radius-lg:12px;
  --shadow:0 1px 3px rgba(0,0,0,.08);--shadow-md:0 4px 12px rgba(0,0,0,.1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:var(--sans);background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}
body{display:flex;flex-direction:column;overflow:hidden}
#app{flex:1;display:flex;flex-direction:column;overflow:hidden}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}

/* PIN */
.pin-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:999}
.pin-box{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:48px 40px;width:360px;text-align:center;box-shadow:var(--shadow-md)}
.pin-logo{font-size:28px;font-weight:700;color:var(--acc);margin-bottom:4px;letter-spacing:-.5px}
.pin-sub{font-size:13px;color:var(--muted);margin-bottom:28px}
.pin-input{font-size:28px;letter-spacing:10px;text-align:center;font-family:var(--mono);font-weight:700;border:2px solid var(--border2);border-radius:10px;padding:12px;width:100%}
.pin-input:focus{border-color:var(--acc);outline:none;box-shadow:0 0 0 3px #2563eb1a}
.pin-error{color:var(--red);font-size:13px;margin-top:10px;font-weight:500}
.pin-btn{margin-top:16px;width:100%;padding:12px;background:var(--acc);color:#fff;border:none;border-radius:var(--radius);font-size:15px;font-weight:600;cursor:pointer;font-family:var(--sans);transition:.15s}
.pin-btn:hover{background:var(--acc-dark)}

/* NAV */
.nav{background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;height:52px;flex-shrink:0;gap:4px;z-index:50}
.nav-brand{font-weight:700;font-size:15px;color:var(--acc);margin-right:16px;letter-spacing:-.3px;white-space:nowrap;display:flex;align-items:center;gap:8px}
.nav-dot{width:8px;height:8px;border-radius:50%;background:var(--acc)}
.ntab{padding:6px 14px;border:none;background:transparent;color:var(--muted);font-family:var(--sans);font-size:13px;font-weight:500;cursor:pointer;border-radius:var(--radius);transition:.15s;white-space:nowrap}
.ntab:hover{background:var(--surface2);color:var(--text)}
.ntab.active{background:var(--acc-light);color:var(--acc);font-weight:600}
.nav-right{margin-left:auto;display:flex;gap:8px;align-items:center}
.sess-pill{background:var(--green-light);border:1px solid var(--green-border);color:var(--green);border-radius:20px;padding:3px 10px;font-size:11px;font-weight:600;display:flex;align-items:center;gap:5px}
.sess-pill-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* BUTTONS */
.btn{padding:8px 16px;border-radius:var(--radius);border:1px solid transparent;font-family:var(--sans);font-size:13px;font-weight:500;cursor:pointer;transition:.15s;display:inline-flex;align-items:center;gap:6px;white-space:nowrap;min-height:34px}
.btn-primary{background:var(--acc);color:#fff;border-color:var(--acc)}
.btn-primary:hover{background:var(--acc-dark)}
.btn-primary:disabled{opacity:.4;cursor:not-allowed}
.btn-outline{background:var(--surface);color:var(--text2);border-color:var(--border2)}
.btn-outline:hover{border-color:var(--acc);color:var(--acc)}
.btn-danger{background:var(--surface);color:var(--red);border-color:var(--red-border)}
.btn-danger:hover{background:var(--red-light)}
.btn-success{background:var(--green);color:#fff;border-color:var(--green)}
.btn-warn{background:var(--orange);color:#fff;border-color:var(--orange)}
.btn-ghost{background:transparent;border-color:transparent;color:var(--muted)}
.btn-ghost:hover{background:var(--surface2);color:var(--text)}
.btn-sm{padding:4px 10px;font-size:12px;min-height:28px}
.btn-lg{padding:11px 20px;font-size:14px;min-height:42px}
.btn-red-solid{background:var(--red);color:#fff;border-color:var(--red)}

/* INPUTS */
input[type=text],input[type=number],input[type=password],select,textarea{
  background:var(--surface);border:1px solid var(--border2);color:var(--text);
  padding:7px 10px;border-radius:var(--radius);font-family:var(--sans);
  font-size:13px;outline:none;transition:.15s;width:100%;min-height:34px}
input:focus,select:focus,textarea:focus{border-color:var(--acc);box-shadow:0 0 0 3px #2563eb1a}
label{font-size:11px;font-weight:600;color:var(--muted);display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:.4px}
.form-row{display:flex;flex-direction:column;gap:4px;margin-bottom:14px}

/* SCANNER */
.scanner-wrap{display:flex;flex:1;overflow:hidden}
.scanner-sidebar{width:270px;flex-shrink:0;border-right:1px solid var(--border);background:var(--surface);display:flex;flex-direction:column;overflow-y:auto}
.scanner-main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.sb-section{padding:14px 16px;border-bottom:1px solid var(--border)}
.sb-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin-bottom:10px}
.mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.mode-btn{padding:10px 8px;border:1.5px solid var(--border2);border-radius:var(--radius);background:var(--surface2);cursor:pointer;font-family:var(--sans);font-size:12px;font-weight:500;text-align:center;transition:.15s;color:var(--text2);line-height:1.3}
.mode-btn:hover{border-color:var(--acc);color:var(--acc);background:var(--acc-light)}
.mode-btn.active{border-color:var(--acc);color:var(--acc);background:var(--acc-light);font-weight:600}
.mode-icon{font-size:16px;display:block;margin-bottom:3px}
.mode-sub{font-size:10px;color:var(--muted);margin-top:1px}
.mode-btn.active .mode-sub{color:var(--acc);opacity:.7}

/* Packing banner */
.pl-banner{background:linear-gradient(135deg,#1e40af,#2563eb);color:#fff;border-radius:var(--radius);padding:12px 14px;margin-bottom:8px}
.pl-banner strong{font-size:13px;display:block;margin-bottom:6px}
.pl-banner-actions{display:flex;gap:6px;flex-wrap:wrap}
.pl-banner-actions .btn{font-size:11px;min-height:26px;padding:3px 10px;border-color:#ffffff60;color:#fff;background:#ffffff20}
.pl-banner-actions .btn:hover{background:#ffffff35}
.pl-banner-actions .btn-reset{border-color:#fca5a5;color:#fca5a5;background:#ffffff10}
.pl-banner-actions .btn-reset:hover{background:#dc262620}

/* Scan zone */
.scan-zone{background:var(--acc-light);border:2px solid var(--acc);border-radius:var(--radius);padding:12px}
.scan-zone-label{font-size:10px;font-weight:700;color:var(--acc);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.scan-input{font-size:15px;padding:10px 12px;font-family:var(--mono);border-color:var(--acc);background:#fff;letter-spacing:1px}
.scan-btns{display:flex;gap:6px;margin-top:8px}
.scan-feedback{margin-top:8px;font-size:12px;font-weight:500;padding:6px 10px;border-radius:6px;display:none}
.scan-feedback.ok{display:block;background:var(--green-light);color:var(--green);border:1px solid var(--green-border)}
.scan-feedback.err{display:block;background:var(--red-light);color:var(--red);border:1px solid var(--red-border)}
.scan-feedback.warn{display:block;background:var(--yellow-light);color:var(--yellow);border:1px solid #fde68a}

/* Counters */
.counters{display:grid;grid-template-columns:repeat(2,1fr);gap:6px}
.cbox{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:8px 4px;text-align:center}
.cbox-val{font-size:20px;font-weight:700;line-height:1}
.cbox-lbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.3px;margin-top:2px}
.cbox.green{background:var(--green-light);border-color:var(--green-border)}
.cbox.green .cbox-val{color:var(--green)}
.cbox.red{background:var(--red-light);border-color:var(--red-border)}
.cbox.red .cbox-val{color:var(--red)}
.cbox.orange{background:var(--orange-light);border-color:var(--orange-border)}
.cbox.orange .cbox-val{color:var(--orange)}
.cbox.purple{background:#f5f3ff;border-color:#c4b5fd}
.cbox.purple .cbox-val{color:#7c3aed}
/* Boutons +/- inline sur tableau */
.inline-qty{display:flex;align-items:center;gap:4px}
.iqty-btn{width:22px;height:22px;border-radius:4px;border:1px solid var(--border2);background:var(--surface);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;transition:.15s;flex-shrink:0;line-height:1;font-weight:600}
.iqty-btn:hover{border-color:var(--acc);color:var(--acc);background:var(--acc-light)}
.iqty-val{font-family:var(--mono);font-weight:700;font-size:14px;min-width:24px;text-align:center}
/* Row inconnue */
.row-inconnu td{background:#faf5ff !important}
.row-inconnu:hover td{background:#f5f3ff !important}
/* Toast inconnu */
.toast-inconnu{position:fixed;bottom:24px;right:24px;background:#7c3aed;color:#fff;padding:10px 16px;border-radius:var(--radius);font-size:13px;font-weight:500;box-shadow:var(--shadow-md);z-index:999;animation:slideIn .25s ease-out}
@keyframes slideIn{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}

/* Topbar */
.main-topbar{padding:10px 16px;border-bottom:1px solid var(--border);background:var(--surface);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;flex-wrap:wrap;gap:8px}
.sess-info{font-size:13px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.sess-info-dot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulse 1.5s infinite}
.filter-tabs{display:flex;gap:2px;flex-wrap:wrap}
.ftab{padding:4px 10px;border:1px solid var(--border2);border-radius:20px;font-size:11px;font-weight:500;cursor:pointer;background:var(--surface);color:var(--muted);transition:.15s}
.ftab:hover{border-color:var(--acc);color:var(--acc)}
.ftab.active{background:var(--acc);color:#fff;border-color:var(--acc)}

/* Scan table */
.scan-table-wrap{flex:1;overflow-y:auto}
.scan-table{width:100%;border-collapse:collapse;font-size:13px}
.scan-table th{background:var(--surface2);padding:9px 12px;text-align:left;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:5;white-space:nowrap}
.scan-table td{padding:9px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
.scan-table tr:hover td{background:var(--surface2)}
.scan-table tr:last-child td{border-bottom:none}
.prog-wrap{width:120px;background:var(--surface3);border-radius:4px;height:6px;overflow:hidden}
.prog-fill{height:100%;border-radius:4px;transition:width .3s}
.prog-ok{background:var(--green)}
.prog-over{background:var(--orange)}
.prog-miss{background:var(--red)}
.prog-neutral{background:var(--acc)}
.ecart-badge{font-family:var(--mono);font-weight:700;font-size:12px}
.ecart-pos{color:var(--orange)}
.ecart-neg{color:var(--red)}
.ecart-ok{color:var(--green)}
.sku-badge{font-family:var(--mono);font-size:11px;background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:2px 6px;color:var(--text2)}
.taille-chip{background:var(--acc-light);color:var(--acc);border:1px solid #93c5fd;border-radius:4px;padding:2px 6px;font-size:11px;font-weight:600}
.cat-chip{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:2px 8px;font-size:11px;color:var(--text2)}

/* History */
.hist-item{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border);font-size:12px}
.hist-item:last-child{border-bottom:none}
.hist-time{font-size:10px;color:var(--muted);white-space:nowrap}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:#00000070;z-index:200;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(3px);padding:20px}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);width:560px;max-width:100%;max-height:90vh;display:flex;flex-direction:column;box-shadow:var(--shadow-md);overflow:hidden}
.modal-sm{width:400px}
.modal-lg{width:740px}
.modal-hd{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.modal-hd h3{font-size:15px;font-weight:600}
.modal-close{background:none;border:none;color:var(--muted);cursor:pointer;font-size:20px;width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:6px;transition:.15s}
.modal-close:hover{background:var(--surface2);color:var(--text)}
.modal-body{overflow-y:auto;padding:20px;flex:1}
.modal-ft{display:flex;gap:8px;justify-content:flex-end;padding:14px 20px;border-top:1px solid var(--border);flex-shrink:0}

/* PAGE */
.page{display:flex;flex-direction:column;flex:1;overflow:hidden}
.page-hd{padding:14px 20px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;flex-wrap:wrap;gap:10px}
.page-hd h2{font-size:15px;font-weight:700}
.page-body{flex:1;overflow-y:auto}

/* TABLES */
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{background:var(--surface2);padding:9px 14px;text-align:left;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:5}
.tbl td{padding:9px 14px;border-bottom:1px solid var(--border);vertical-align:middle;color:var(--text2)}
.tbl tr:hover td{background:var(--surface2)}
.tbl tr:last-child td{border-bottom:none}

/* BADGES */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500}
.badge-blue{background:var(--acc-light);color:var(--acc)}
.badge-green{background:var(--green-light);color:var(--green);border:1px solid var(--green-border)}
.badge-red{background:var(--red-light);color:var(--red);border:1px solid var(--red-border)}
.badge-orange{background:var(--orange-light);color:var(--orange);border:1px solid var(--orange-border)}
.badge-gray{background:var(--surface2);color:var(--muted);border:1px solid var(--border)}
.badge-yellow{background:var(--yellow-light);color:var(--yellow);border:1px solid #fde68a}

/* DEFECT */
.defect-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:4px 0 16px}
.defect-btn{padding:9px 6px;border:1.5px solid var(--border2);border-radius:var(--radius);background:var(--surface2);cursor:pointer;font-size:12px;font-family:var(--sans);font-weight:500;text-align:center;transition:.15s}
.defect-btn:hover{border-color:var(--orange);color:var(--orange)}
.defect-btn.sel{background:var(--orange-light);border-color:var(--orange);color:var(--orange)}

/* SESSION CARDS */
.sess-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);margin-bottom:10px;overflow:hidden;box-shadow:var(--shadow)}
.sess-card-hd{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer;transition:.15s;flex-wrap:wrap}
.sess-card-hd:hover{background:var(--surface2)}
.sess-card-name{font-weight:600;font-size:14px;flex:1}
.sess-card-bd{border-top:1px solid var(--border);padding:16px}

/* ALERTS */
.alert{padding:10px 14px;border-radius:var(--radius);font-size:13px;margin-bottom:12px}
.alert-warn{background:var(--yellow-light);border:1px solid #fde68a;color:var(--yellow)}
.alert-info{background:var(--acc-light);border:1px solid #93c5fd;color:var(--acc)}
.alert-danger{background:var(--red-light);border:1px solid var(--red-border);color:var(--red)}
.alert-success{background:var(--green-light);border:1px solid var(--green-border);color:var(--green)}

/* MISC */
.empty{text-align:center;padding:4rem 2rem;color:var(--muted)}
.empty-icon{font-size:36px;margin-bottom:12px}
.img-thumb{width:36px;height:36px;object-fit:cover;border-radius:6px;border:1px solid var(--border)}
.img-ph{width:36px;height:36px;background:var(--surface2);border-radius:6px;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--muted)}
.loading{display:flex;align-items:center;justify-content:center;padding:3rem;color:var(--muted);gap:10px}
.spinner{width:18px;height:18px;border:2px solid var(--border2);border-top-color:var(--acc);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.divider{height:1px;background:var(--border);margin:12px 0}

/* PACKING LIST BUILDER */
.pl-line{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border)}
.pl-line:last-child{border-bottom:none}
.pl-line-info{flex:1;min-width:0}
.pl-line-nom{font-weight:500;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pl-line-sku{font-family:var(--mono);font-size:11px;color:var(--muted)}
.pl-line-taille{background:var(--acc-light);color:var(--acc);border:1px solid #93c5fd;border-radius:4px;padding:1px 6px;font-size:11px;font-weight:600;margin-left:4px}
.qty-ctrl{display:flex;align-items:center}
.qty-input{width:60px;text-align:center;font-family:var(--mono);font-weight:700;font-size:14px;padding:4px 6px;min-height:32px;border:1.5px solid var(--border2);border-radius:var(--radius)}
.qty-input:focus{border-color:var(--acc);box-shadow:0 0 0 3px #2563eb1a}
.pl-del{color:var(--muted);cursor:pointer;font-size:18px;padding:2px 4px;border:none;background:none;transition:.15s;line-height:1}
.pl-del:hover{color:var(--red)}

/* AUTOCOMPLETE */
.relative{position:relative}
.suggest-box{position:absolute;top:100%;left:0;right:0;background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius);box-shadow:var(--shadow-md);z-index:100;max-height:220px;overflow-y:auto}
.suggest-item{padding:8px 12px;cursor:pointer;font-size:13px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.suggest-item:hover{background:var(--acc-light);color:var(--acc)}
.suggest-item:last-child{border-bottom:none}
.suggest-sku{font-family:var(--mono);font-size:11px;color:var(--muted);margin-left:auto;flex-shrink:0}

/* CLOSE SESSION OPTIONS */
.close-opt{display:flex;align-items:flex-start;gap:12px;padding:14px;border:2px solid var(--border);border-radius:var(--radius-lg);cursor:pointer;transition:.15s;background:var(--surface);width:100%;text-align:left;font-family:var(--sans);margin-bottom:8px}
.close-opt:hover{border-color:var(--acc);background:var(--acc-light)}
.close-opt.sel{border-color:var(--acc);background:var(--acc-light)}
.close-opt-icon{font-size:22px;flex-shrink:0}
.close-opt-title{font-weight:600;font-size:14px;margin-bottom:2px}
.close-opt-sub{font-size:12px;color:var(--muted)}

/* RETOURS */

/* GROUPE CATALOGUE / SESSION */
.group-hd{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;background:var(--surface2);border-bottom:1px solid var(--border);font-weight:600;font-size:13px;color:var(--text);user-select:none}
.group-hd:hover{background:var(--surface3)}
.group-arrow{font-size:11px;color:var(--muted);margin-left:auto}
.group-variant{background:var(--surface);border-bottom:1px solid var(--border)}
.group-variant td{padding:8px 14px;font-size:13px;color:var(--text2)}
.group-variant:last-child td{border-bottom:none}
.group-variant:hover td{background:var(--acc-light)}
.group-total{font-family:var(--mono);font-size:12px;font-weight:600}

@media(max-width:768px){
  .scanner-sidebar{width:100%;border-right:none;border-bottom:1px solid var(--border);max-height:55vh}
  .scanner-wrap{flex-direction:column}

<div id="app"></div>
<script>
// ── CONFIG ────────────────────────────────────────────────────────────────
const SUPABASE_URL = 'https://vmpcpuexszmlalezheep.supabase.co';
const SUPABASE_KEY = 'sb_publishable_3cIIsB3hvU4fEnT1WrUShQ_V4-xV0Eo';
const PIN = '130801';
const APP = 'Stock-Logistique';
const DEFECT_TYPES = ['Tâche','Défaut couture','Déchirure','Trou','Mauvaise conception','Autre'];
const MODES = [
  {id:'reception',icon:'📥',label:'Réception',sub:'Stock entrant'},
  {id:'retour',icon:'↩️',label:'Retour Shop',sub:'Magasin partenaire'},
  {id:'test',icon:'🧪',label:'Test',sub:'Sans impact stock'},
  {id:'inventaire',icon:'🔍',label:'Inventaire',sub:'Comptage seul'},
];

const {createClient} = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

// ── STATE ─────────────────────────────────────────────────────────────────
let S = {
  authed: sessionStorage.getItem('sl_auth') === '1',
  pinError: false,
  page: 'scanner',
  // Scanner
  session: null,
  mode: 'reception',

  mAddProd: false,

  mConfirmClose: false,
  closeOption: 'save',
  mEditScan: null,
  // Packing builder

  plSearch: '',
  plSuggest: [],

  // UI
  expandedSession: null,
  mEditSessionName: null, // {id, nom} pour éditer le titre
  mEditSessionScan: null, // {scan, sessionId} pour éditer un scan historique
  mEditSessionNote: null, // {sessionId, nom} pour éditer la note
  sessAddSearch: {}, // {sessionId: searchTerm} pour l'ajout d'article
  sessAddSuggest: {}, // {sessionId: [produits]}
  mSessPL: null, // {sessionId, key, current} pour éditer la PL d'une session
  folders: JSON.parse(localStorage.getItem('sl_folders') || '[]'),

  searchCat: '',
  searchSess: '',
  loadingSess: false,

};

function set(patch) {
  Object.assign(S, patch);
  // Auto-sauvegarde de la packing list à chaque changement
  if ('packingList' in patch && S.session) {
    try {
      if (S.packingList) localStorage.setItem('pl_' + S.session.id, JSON.stringify(S.packingList));
      else localStorage.removeItem('pl_' + S.session.id);
    } catch(e) {}
  }
  render();
}

// ── DB ────────────────────────────────────────────────────────────────────
async function loadCatalogue() {
  const {data} = await db.from('catalogue').select('*').order('nom');
  set({catalogue: data || []});
}
async function loadSessions() {
  // Sauvegarder la position de scroll avant rechargement
  const _scrollPos = document.getElementById('sessList')?.scrollTop || 0;
  const _pageScroll = document.querySelector('.page-body')?.scrollTop || 0;
  set({loadingSess: true});
  const {data} = await db.from('sessions').select('*,scans(*)').order('created_at', {ascending: false});
  set({sessions: data || [], loadingSess: false});
  // Restaurer le scroll après reconstruction du DOM
  requestAnimationFrame(() => {
    const list = document.getElementById('sessList');
    if (list && _scrollPos) list.scrollTop = _scrollPos;
    const pb = document.querySelector('.page-body');
    if (pb && _pageScroll) pb.scrollTop = _pageScroll;
  });
  // Si une session est active en cours, restaurer la PL depuis localStorage
  if (S.session && !S.packingList) {
    try {
      const saved = localStorage.getItem('pl_' + S.session.id);
      if (saved) { const pl = JSON.parse(saved); if (pl && pl.length > 0) set({packingList: pl}); }
    } catch(e) {}
  }
}
async function loadDefectueux() {
  set({loadingDef: true});
  const {data} = await db.from('defectueux').select('*').order('created_at', {ascending: false});
  set({defectueux: data || [], loadingDef: false});
}
async function dbStartSession(nom, mode) {
  const {data} = await db.from('sessions').insert({nom, mode, status: 'active'}).select().single();
  return data;
}
async function dbCloseSession(id) {
  await db.from('sessions').update({status: 'closed', closed_at: new Date().toISOString()}).eq('id', id);
}
async function dbPauseSession(id) {
  const {error} = await db.from('sessions').update({status: 'paused'}).eq('id', id);
  if (error) {
    const sess = S.sessions.find(s => s.id === id);
    if (sess && !sess.nom.startsWith('[PAUSE] ')) {
      await db.from('sessions').update({nom: '[PAUSE] ' + sess.nom, status: 'active'}).eq('id', id);
    }
  }
}
async function dbResumeSession(id) {
  const {error} = await db.from('sessions').update({status: 'active'}).eq('id', id);
  if (error) console.warn('Erreur reprise session:', error);
  // Nettoyer le préfixe [PAUSE] si présent
  const sess = S.sessions.find(s => s.id === id);
  if (sess && sess.nom.startsWith('[PAUSE] ')) {
    await db.from('sessions').update({nom: sess.nom.replace('[PAUSE] ', '')}).eq('id', id);
  }
}
async function dbDeleteSession(id) {
  await db.from('sessions').delete().eq('id', id);
}
async function dbUpsertScan(sessionId, scan) {
  // Accepter _dbId ou id (scans chargés depuis Supabase ont 'id')
  const existingId = scan._dbId || scan.id;
  if (existingId) {
    await db.from('scans').update({qty_pos: scan.qty_pos, qty_neg: scan.qty_neg}).eq('id', existingId);
    if (!scan._dbId) scan._dbId = existingId; // normaliser
  } else {
    // Vérifier si un scan existe déjà en base pour éviter les doublons
    const {data: existing} = await db.from('scans').select('id').eq('session_id', sessionId).eq('sku', scan.sku).single();
    if (existing) {
      await db.from('scans').update({qty_pos: scan.qty_pos, qty_neg: scan.qty_neg}).eq('id', existing.id);
      scan._dbId = existing.id;
    } else {
      const {data} = await db.from('scans').insert({
        session_id: sessionId, sku: scan.sku, nom: scan.nom,
        qty_pos: scan.qty_pos, qty_neg: scan.qty_neg
      }).select().single();
      if (data) scan._dbId = data.id;
    }
  }
}
async function dbUpdateSessionName(id, nom) {
  await db.from('sessions').update({nom}).eq('id', id);
}
function getSessionNote(sessionId) {
  try { return localStorage.getItem('note_sess_' + sessionId) || ''; } catch(e) { return ''; }
}
function saveSessionNote(sessionId, note) {
  try { localStorage.setItem('note_sess_' + sessionId, note); } catch(e) {}
}
async function dbDeleteScan(scanId) {
  await db.from('scans').delete().eq('id', scanId);
}
async function dbUpdateScan(scanId, fields) {
  await db.from('scans').update(fields).eq('id', scanId);
}
async function dbSaveDefect(sku, nom, type, note, sessionId) {
  await db.from('defectueux').insert({sku, nom, type_defaut: type, note: note || null, session_id: sessionId || null});
}

// ── DOSSIERS (localStorage) ──────────────────────────────────────────────
function getFolders() {
  try { return JSON.parse(localStorage.getItem('sl_folders') || '[]'); } catch(e) { return []; }
}
function saveFolders(folders) {
  localStorage.setItem('sl_folders', JSON.stringify(folders));
  S.folders = folders;
}
function createFolder(nom) {
  const folders = getFolders();
  const id = 'folder_' + Date.now();
  folders.push({id, nom, sessionIds: []});
  saveFolders(folders);
  set({folders: [...folders], mNewFolder: false});
}
function deleteFolder(id) {
  const folders = getFolders().filter(f => f.id !== id);
  saveFolders(folders);
  set({folders: [...folders]});
}
function addToFolder(folderId, sessionId) {
  const folders = getFolders();
  folders.forEach(f => { f.sessionIds = f.sessionIds.filter(id => id !== sessionId); }); // retirer d'autres dossiers
  const folder = folders.find(f => f.id === folderId);
  if (folder && !folder.sessionIds.includes(sessionId)) folder.sessionIds.push(sessionId);
  saveFolders(folders);
  set({folders: [...folders], mAddToFolder: null});
}
function removeFromFolder(folderId, sessionId) {
  const folders = getFolders();
  const folder = folders.find(f => f.id === folderId);
  if (folder) folder.sessionIds = folder.sessionIds.filter(id => id !== sessionId);
  saveFolders(folders);
  set({folders: [...folders]});
}
async function exportExcelFolder(folder) {
  const sessions = S.sessions.filter(s => folder.sessionIds.map(String).includes(String(s.id)));
  if (!sessions.length) { alert('Aucune session dans ce dossier.'); return; }

  const wb = new ExcelJS.Workbook();
  wb.creator = 'Stock-Logistique';
  wb.created = new Date();

  // Ajouter chaque session — charger la PL depuis localStorage pour chacune
  for (const s of sessions) {
    let pl = [];
    try { const raw = localStorage.getItem('pl_' + s.id); if (raw) pl = JSON.parse(raw); } catch(e) {}
    const _prefix = s.nom.replace(/[^a-zA-Z0-9 _]/g,'').trim().substring(0,25) || ('Sess'+String(s.id).substring(0,6));
    await addSessionToWorkbook(wb, s, s.scans || [], pl, _prefix);
  }

  const buf = await wb.xlsx.writeBuffer();
  const blob = new Blob([buf], {type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'Dossier_'+folder.nom.replace(/[^a-zA-Z0-9]/g,'_')+'_'+new Date().toISOString().split('T')[0]+'.xlsx';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

// ── SCAN ──────────────────────────────────────────────────────────────────
function showToastInconnu(msg) {
  const existing = document.getElementById('toastInconnu');
  if (existing) existing.remove();
  const toast = document.createElement('div');
  toast.id = 'toastInconnu';
  toast.className = 'toast-inconnu';
  toast.textContent = '🔍 ' + msg;
  document.body.appendChild(toast);
  setTimeout(() => { toast.style.opacity='0'; toast.style.transition='opacity .3s'; setTimeout(() => toast.remove(), 300); }, 4000);
}

function doScan(rawSku, delta = 1) {
  if (!S.session) {
    set({scanFeedback: {type: 'err', msg: '❌ Aucune session active — démarrez une session'}});
    clearFB(); return;
  }
  const sku = rawSku.trim().toUpperCase();
  if (!sku) return;
  const produit = S.catalogue.find(p => p.sku === sku);
  const plItem = S.packingList?.find(p => p.sku === sku);
  let sc = S.scans.find(s => s.sku === sku);
  if (!sc) {
    sc = {sku, nom: produit?.nom || sku, cat: produit?.categorie || '', taille: produit?.taille || '',
      qty_pos: 0, qty_neg: 0, attendu: plItem?.attendu || 0, _dbId: null};
    S.scans.push(sc);
  }
  if (delta > 0) sc.qty_pos = (sc.qty_pos || 0) + delta;
  else sc.qty_neg = (sc.qty_neg || 0) + Math.abs(delta);
  dbUpsertScan(S.session.id, sc);
  let type = 'ok', msg = '';
  if (!produit) {
    type = 'warn'; msg = '⚠ SKU inconnu : ' + sku;
    // Toast article inconnu
    showToastInconnu('Article non reconnu — vérifiez le SKU ou modifiez manuellement : ' + sku);
  }
  else if (S.packingList && !plItem) { type = 'warn'; msg = '⚠ ' + produit.nom + ' — non attendu'; }
  else msg = (delta > 0 ? '+' + delta : delta) + ' × ' + (produit?.nom || sku);
  S.history.unshift({sku, nom: produit?.nom || sku, delta, time: new Date().toLocaleTimeString('fr-FR', {hour:'2-digit',minute:'2-digit',second:'2-digit'})});
  if (S.history.length > 100) S.history.pop();
  set({scans: [...S.scans], history: [...S.history], scanInput: '', scanFeedback: {type, msg}});
  clearFB();
}

function undoLast() {
  if (!S.history.length) return;
  const last = S.history[0];
  const sc = S.scans.find(s => s.sku === last.sku);
  if (sc) {
    if (last.delta > 0) sc.qty_pos = Math.max(0, (sc.qty_pos || 0) - last.delta);
    else sc.qty_neg = Math.max(0, (sc.qty_neg || 0) - Math.abs(last.delta));
    if (sc.qty_pos === 0 && sc.qty_neg === 0) S.scans = S.scans.filter(s => s.sku !== last.sku);
    else dbUpsertScan(S.session.id, sc);
  }
  S.history.shift();
  set({scans: [...S.scans], history: [...S.history]});
}

let fbTimer = null;
function clearFB() {
  clearTimeout(fbTimer);
  fbTimer = setTimeout(() => set({scanFeedback: null}), 3500);
}

async function startSession() {
  const nom = S.sessionName.trim();
  if (!nom) {
    alert('Veuillez saisir un nom pour la session avant de démarrer.');
    document.querySelector('.sb-section input[type=text]')?.focus();
    return;
  }
  const data = await dbStartSession(nom, S.mode);
  if (data) {
    // La PL est conservée si elle était déjà définie avant le démarrage
    set({session: data, scans: [], history: [], scanFeedback: null, sessionName: ''});
    // Sauvegarder immédiatement la PL si elle existe
    if (S.packingList) {
      try { localStorage.setItem('pl_' + data.id, JSON.stringify(S.packingList)); } catch(e) {}
    }
  }
}

async function closeSession() {
  if (!S.session) return;
  const opt = S.closeOption;
  const closedScans = [...S.scans];
  const closedSession = {...S.session};
  const closedPL = S.packingList ? [...S.packingList] : null;
  if (opt === 'test') {
    await dbDeleteSession(S.session.id);
  } else if (opt === 'pause') {
    // Utiliser closedPL qui est capturé avant tout changement d'état
    if (closedPL) localStorage.setItem('pl_' + closedSession.id, JSON.stringify(closedPL));
    else localStorage.removeItem('pl_' + closedSession.id);
    await dbPauseSession(closedSession.id);
  } else {
    await dbCloseSession(S.session.id);
  }
  // Nettoyer la PL du localStorage si session clôturée ou supprimée (pas en pause)
  if (opt !== 'pause') {
    localStorage.removeItem('pl_' + closedSession.id);
    localStorage.removeItem('pl_session_' + closedSession.id);
  }
  set({session: null, scans: [], history: [], packingList: null, mConfirmClose: false, closeOption: 'save'});
  if (opt === 'export') {
    exportExcelSession(closedSession, closedScans, closedPL);
  }
  loadSessions();
}

// ── COMPUTED ──────────────────────────────────────────────────────────────
function getRows() {
  let rows = [...S.scans];
  if (S.packingList) {
    S.packingList.forEach(pl => {
      const existing = rows.find(r => r.sku === pl.sku);
      if (!existing) rows.push({sku: pl.sku, nom: pl.nom, cat: pl.cat || '', taille: pl.taille || '', qty_pos: 0, qty_neg: 0, attendu: pl.attendu});
      else if (!existing.attendu) existing.attendu = pl.attendu;
    });
  }
  switch (S.filter) {
    case 'conformes': return rows.filter(r => r.attendu && r.qty_pos === r.attendu && r.qty_neg === 0);
    case 'manquants': return rows.filter(r => r.attendu && r.qty_pos < r.attendu);
    case 'surplus': return rows.filter(r => r.attendu ? r.qty_pos > r.attendu : false);
    case 'inconnus': return rows.filter(r => !r.attendu && r.qty_pos > 0);
    default: return rows;
  }
}

function getCounters() {
  const rows = S.scans;
  const total = rows.reduce((a, r) => a + (r.qty_pos || 0), 0);
  let conformes = 0, manquants = 0, surplus = 0, inconnus = 0;
  if (S.packingList) {
    rows.forEach(r => {
      const pl = S.packingList.find(p => p.sku === r.sku);
      if (!pl) { inconnus++; return; }
      if (r.qty_pos === pl.attendu) conformes++;
      else if (r.qty_pos > pl.attendu) surplus++;
      else manquants++;
    });
    S.packingList.forEach(pl => { if (!rows.find(r => r.sku === pl.sku)) manquants++; });
  }
  return {total, conformes, manquants, surplus, inconnus};
}

// ── EXPORT EXCEL ──────────────────────────────────────────────────────────
// ── Extraire la taille depuis le SKU (ex: ZIP-M-OG → M) ──
function getTailleFromSku(sku, catalogueTaille) {
  if (catalogueTaille) return catalogueTaille;
  const SIZES = ['XXS','XS','S','M','L','XL','XXL','2XL','3XL','XXXL','TU','OS'];
  const parts = (sku||'').toUpperCase().split('-');
  for (const p of parts) { if (SIZES.includes(p)) return p; }
  return 'TU';
}

// ── Fonction partagée : ajoute les feuilles d'une session à un workbook existant ──
async function addSessionToWorkbook(wb, session, scans, pl, sheetPrefix) {
  // pl déjà résolu par l'appelant — on l'utilise directement
  pl = pl || [];
  scans = (scans || []).filter(sc => (sc.qty_pos||0) > 0 || (sc.qty_neg||0) > 0);

  // ── Helpers styles ──
  const C = {
    headerBg:'1e3a5f', headerFg:'FFFFFF',
    subBg:'dde3f0',    subFg:'1e3a5f',
    okBg:'e2efda',     okFg:'276221',
    missBg:'ffc7ce',   missFg:'9c0006',
    surpBg:'ffeb9c',   surpFg:'7d5c00',
    unknBg:'e2e8f0',   unknFg:'64748b',
    totalBg:'f1f5f9',  totalFg:'1e3a5f',
    infoBg:'f8fafc',   lblBg:'e2e8f0',
    defBg:'fff3cd',    defFg:'856404',
  };
  function fillSolid(argb) { return {type:'pattern', pattern:'solid', fgColor:{argb:'FF'+argb}}; }
  function fontStyle(argb, bold, sz) { return {color:{argb:'FF'+argb}, bold:!!bold, size:sz||11, name:'Calibri'}; }
  function border(style) {
    style = style||'thin';
    const s = {style, color:{argb:'FF1e3a5f'}};
    return {top:s, left:s, bottom:s, right:s};
  }
  function applyRow(row, fillColor, fontColor, bold, sz, center) {
    row.eachCell({includeEmpty:true}, cell => {
      cell.fill = fillSolid(fillColor);
      cell.font = fontStyle(fontColor, bold, sz);
      cell.border = border('thin');
      cell.alignment = {horizontal: center?'center':'left', vertical:'middle'};
    });
  }
  // Encoder la colonne Excel (1=A, 2=B, ...)
  function col(n) { return String.fromCharCode(64+n); }

  // ── 3. Grouper par nom produit ──
  // Colonnes : A=Taille B=Nom C=SKU D=Cat E=Attendu F=Scanné G=Retours H=Ecart I=Statut
  const COL = {taille:1, nom:2, sku:3, cat:4, attendu:5, scanne:6, retours:7, ecart:8, statut:9};

  const groups = {};
  scans.forEach(sc => {
    const key = sc.nom || sc.sku;
    if (!groups[key]) groups[key] = {nom:key, variantes:[]};
    const plItem = pl.find(p => p.sku === sc.sku);
    const taille = getTailleFromSku(sc.sku, sc.taille);
    groups[key].variantes.push({...sc, taille, attendu: sc.attendu||plItem?.attendu||0});
  });
  // Ajouter les items PL non scannés (= manquants)
  pl.forEach(p => {
    const key = p.nom || p.sku;
    if (!groups[key]) groups[key] = {nom:key, variantes:[]};
    if (!groups[key].variantes.find(v => v.sku === p.sku)) {
      const taille = getTailleFromSku(p.sku, p.taille);
      groups[key].variantes.push({sku:p.sku, nom:p.nom, taille, cat:p.cat||'', qty_pos:0, qty_neg:0, attendu:p.attendu||0});
    }
  });
  // Trier variantes par taille
  const TAILLE_ORDER = ['XXS','XS','S','M','L','XL','XXL','2XL','3XL','TU','OS'];
  Object.values(groups).forEach(g => {
    g.variantes.sort((a,b) => {
      const ai = TAILLE_ORDER.indexOf((a.taille||'').toUpperCase());
      const bi = TAILLE_ORDER.indexOf((b.taille||'').toUpperCase());
      return (ai===-1?99:ai) - (bi===-1?99:bi);
    });
  });

  // ── FEUILLE RAPPORT ──
  const _sheetBase = sheetPrefix ? sheetPrefix.replace(/[^a-zA-Z0-9 _]/g,'').trim().substring(0,25) : 'Rapport session';
  const ws = wb.addWorksheet(_sheetBase, {views:[{showGridLines:false}]});
  ws.columns = [
    {width:10},{width:26},{width:22},{width:12},
    {width:10},{width:10},{width:10},{width:10},{width:16}
  ];

  const modeLabel = MODES.find(m => m.id === session.mode)?.label || session.mode;
  const plInfo = pl.length > 0
    ? pl.length + ' références — ' + pl.reduce((a,p)=>a+(p.attendu||1),0) + ' articles attendus'
    : 'Aucune packing list';

  // Titre
  ws.addRow([]);
  const titleRow = ws.addRow(['  RAPPORT DE SESSION — STOCK-LOGISTIQUE']);
  ws.mergeCells(titleRow.number, 1, titleRow.number, 9);
  titleRow.height = 30;
  titleRow.getCell(1).fill = fillSolid(C.headerBg);
  titleRow.getCell(1).font = fontStyle(C.headerFg, true, 15);
  titleRow.getCell(1).alignment = {horizontal:'center', vertical:'middle'};
  ws.addRow([]);

  // Infos session
  [
    ['Nom de la session', session.nom],
    ['Date et heure', new Date(session.created_at).toLocaleString('fr-FR')],
    ['Mode', modeLabel],
    ['Packing list', plInfo],
  ].forEach(([label, val]) => {
    const r = ws.addRow([label, val]);
    r.height = 20;
    r.getCell(1).fill = fillSolid(C.lblBg);
    r.getCell(1).font = fontStyle(C.headerBg, true, 11);
    r.getCell(1).border = border('thin');
    r.getCell(1).alignment = {vertical:'middle'};
    r.getCell(2).fill = fillSolid(C.infoBg);
    r.getCell(2).font = fontStyle('334155', false, 11);
    r.getCell(2).border = border('thin');
    r.getCell(2).alignment = {vertical:'middle'};
    ws.mergeCells(r.number, 2, r.number, 9);
  });
  ws.addRow([]); ws.addRow([]);

  // Compteurs globaux
  let gAttendu=0, gScanne=0, gConformes=0, gManquants=0, gSurplus=0, gInconnus=0;

  // ── Blocs par produit ──
  Object.values(groups).forEach(g => {
    const tAttendu = g.variantes.reduce((a,v)=>a+(v.attendu||0), 0);
    const tScanne  = g.variantes.reduce((a,v)=>a+(v.qty_pos||0), 0);
    const tNeg     = g.variantes.reduce((a,v)=>a+(v.qty_neg||0), 0);
    const tDef     = S.defectueux.filter(d=>g.variantes.some(v=>v.sku===d.sku)).length;
    gAttendu += tAttendu; gScanne += tScanne;

    // En-tête produit
    const prodRow = ws.addRow(['  ' + g.nom.toUpperCase()]);
    ws.mergeCells(prodRow.number, 1, prodRow.number, 9);
    prodRow.height = 24;
    prodRow.getCell(1).fill = fillSolid(C.headerBg);
    prodRow.getCell(1).font = fontStyle(C.headerFg, true, 12);
    prodRow.getCell(1).border = border('medium');
    prodRow.getCell(1).alignment = {horizontal:'left', vertical:'middle'};

    // Sous-résumé produit
    const sumRow = ws.addRow([
      '', 'Attendu: '+tAttendu, '', '', '',
      'Scanne: '+tScanne, '',
      'Ecart: '+(tScanne-tAttendu>=0?'+':'')+(tScanne-tAttendu),
      tDef > 0 ? tDef+' def.' : ''
    ]);
    sumRow.height = 16;
    sumRow.eachCell({includeEmpty:true}, cell => {
      cell.fill = fillSolid('eef2ff');
      cell.font = fontStyle(C.headerBg, true, 10);
      cell.border = border('thin');
      cell.alignment = {horizontal:'center', vertical:'middle'};
    });

    // En-têtes colonnes
    const hdrRow = ws.addRow(['Taille','Nom du produit','SKU','Categorie','Attendu','Scanne (+)','Retours (-)','Ecart net','Statut']);
    hdrRow.height = 18;
    applyRow(hdrRow, C.subBg, C.subFg, true, 11, true);

    // ── Lignes variantes avec formule écart ──
    const firstVarRow = ws.lastRow.number + 1;
    g.variantes.forEach(v => {
      const ecart = (v.qty_pos||0) - (v.attendu||0);
      let statut, bg, fg;
      if (!v.attendu && (v.qty_pos||0) > 0) { statut='Non attendu'; bg=C.unknBg; fg=C.unknFg; gInconnus += (v.qty_pos||0); }
      else if (ecart === 0 && v.attendu)      { statut='OK';        bg=C.okBg;   fg=C.okFg;   gConformes += (v.qty_pos||0); }
      else if (ecart > 0)                     { statut='Surplus';   bg=C.surpBg; fg=C.surpFg; gSurplus   += ecart; }
      else                                    { statut='Manquant';  bg=C.missBg; fg=C.missFg; gManquants += Math.abs(ecart); }

      const vRow = ws.addRow([
        v.taille||'TU', v.nom||v.sku, v.sku, v.cat||'',
        v.attendu||0, v.qty_pos||0, v.qty_neg||0,
        null, // écart = formule
        statut
      ]);
      // Formule écart : =F{r}-E{r} (scanné - attendu)
      vRow.getCell(COL.ecart).value = {formula: col(COL.scanne)+vRow.number+'-'+col(COL.attendu)+vRow.number};
      vRow.height = 18;
      vRow.eachCell({includeEmpty:true}, (cell, c) => {
        cell.fill = fillSolid(bg);
        cell.font = fontStyle(fg, c===COL.statut, 11);
        cell.border = border('thin');
        cell.alignment = {horizontal: c<=2?'left':'center', vertical:'middle'};
      });
    });
    const lastVarRow = ws.lastRow.number;

    // ── Ligne TOTAL avec formules SUM ──
    const totRow = ws.addRow(['TOTAL', '', '', '', null, null, null, null, tDef>0?tDef+' def.':'']);
    ws.mergeCells(totRow.number, 1, totRow.number, 4);
    // Formules SUM
    // Formules SUM correctes : =SUM(E5:E8) avec lettre de colonne des deux côtés
    const cAtt = col(COL.attendu), cSca = col(COL.scanne), cRet = col(COL.retours), cEca = col(COL.ecart);
    totRow.getCell(COL.attendu).value = {formula: 'SUM('+cAtt+firstVarRow+':'+cAtt+lastVarRow+')'};
    totRow.getCell(COL.scanne).value  = {formula: 'SUM('+cSca+firstVarRow+':'+cSca+lastVarRow+')'};
    totRow.getCell(COL.retours).value = {formula: 'SUM('+cRet+firstVarRow+':'+cRet+lastVarRow+')'};
    // Écart total = Scanné total - Attendu total
    totRow.getCell(COL.ecart).value = {formula: cSca+totRow.number+'-'+cAtt+totRow.number};
    totRow.height = 20;
    totRow.eachCell({includeEmpty:true}, (cell, c) => {
      cell.fill = fillSolid(C.totalBg);
      cell.font = fontStyle(C.totalFg, true, 11);
      cell.border = border('medium');
      cell.alignment = {horizontal: c===1?'left':'center', vertical:'middle'};
    });
    // Couleur écart total
    const tEcart = tScanne - tAttendu;
    totRow.getCell(COL.ecart).font = fontStyle(tEcart===0?C.okFg:tEcart>0?C.surpFg:C.missFg, true, 11);

    ws.addRow([]); ws.addRow([]);
  });

  // ── RÉSUMÉ GLOBAL (8 lignes) ──
  const globOk = gManquants===0 && gSurplus===0 && gInconnus===0;
  const defTotal = S.defectueux.filter(d=>d.session_id===session.id).length;

  const resumeTitle = ws.addRow(['  RESUME DE SESSION']);
  ws.mergeCells(resumeTitle.number, 1, resumeTitle.number, 9);
  resumeTitle.height = 24;
  resumeTitle.getCell(1).fill = fillSolid(C.headerBg);
  resumeTitle.getCell(1).font = fontStyle(C.headerFg, true, 13);
  resumeTitle.getCell(1).border = border('medium');
  resumeTitle.getCell(1).alignment = {horizontal:'center', vertical:'middle'};

  // Construire le détail manquants/surplus par variante
  const detailManquants = [], detailSurplus = [];
  Object.values(groups).forEach(g => {
    g.variantes.forEach(v => {
      const ecartV = (v.qty_pos||0) - (v.attendu||0);
      if (v.attendu && ecartV < 0) detailManquants.push({nom: g.nom, taille: v.taille||'', manque: Math.abs(ecartV)});
      if (ecartV > 0) detailSurplus.push({nom: g.nom, taille: v.taille||'', surplus: ecartV});
    });
  });

  const resumeRows = [
    ['Total articles attendus (packing list)', gAttendu,   C.infoBg, '334155', false],
    ['Total articles scannes',                  gScanne,    C.infoBg, '334155', false],
    ['Articles conformes',                      gConformes, C.okBg,   C.okFg,   true],
    ['Articles manquants (quantite)',           gManquants, gManquants>0?C.missBg:C.okBg, gManquants>0?C.missFg:C.okFg, gManquants>0],
    ['Articles en surplus (quantite)',          gSurplus,   gSurplus>0?C.surpBg:C.okBg,   gSurplus>0?C.surpFg:C.okFg,   gSurplus>0],
    ['Articles non attendus (quantite)',        gInconnus,  gInconnus>0?C.unknBg:C.okBg,  gInconnus>0?C.unknFg:C.okFg,  gInconnus>0],
    ['Articles defectueux',                     defTotal,   defTotal>0?C.defBg:C.okBg,     defTotal>0?C.defFg:C.okFg,    defTotal>0],
    ['Statut global', globOk?'CONFORME':'ECARTS DETECTES', globOk?C.okBg:C.missBg, globOk?C.okFg:C.missFg, true],
  ];

  resumeRows.forEach(([label, val, bg, fg, bold]) => {
    // Mettre la valeur directement en colonne 8 (pas via addRow sinon elle va en col 2)
    const r = ws.addRow([label, '', '', '', '', '', '', val, '']);
    ws.mergeCells(r.number, 1, r.number, 7);
    ws.mergeCells(r.number, 8, r.number, 9);
    r.height = 20;
    r.getCell(1).fill = fillSolid(C.lblBg);
    r.getCell(1).font = fontStyle(C.headerBg, true, 11);
    r.getCell(1).border = border('thin');
    r.getCell(1).alignment = {vertical:'middle'};
    r.getCell(8).fill = fillSolid(bg);
    r.getCell(8).font = fontStyle(fg, bold, 12);
    r.getCell(8).border = border('thin');
    r.getCell(8).alignment = {horizontal:'center', vertical:'middle'};
  });

  // ── Détail manquants par variante ──
  if (detailManquants.length > 0) {
    ws.addRow([]);
    const dmTitle = ws.addRow(['  DETAIL — ARTICLES MANQUANTS PAR VARIANTE']);
    ws.mergeCells(dmTitle.number, 1, dmTitle.number, 9);
    dmTitle.height = 20;
    dmTitle.getCell(1).fill = fillSolid(C.missBg);
    dmTitle.getCell(1).font = fontStyle(C.missFg, true, 11);
    dmTitle.getCell(1).border = border('medium');
    dmTitle.getCell(1).alignment = {horizontal:'left', vertical:'middle'};
    const dmHdr = ws.addRow(['Produit', '', 'Variante / Taille', '', 'Attendu', 'Scanne', '', 'Manque', '']);
    dmHdr.height = 16; applyRow(dmHdr, C.subBg, C.subFg, true, 10, true);
    detailManquants.forEach(d => {
      const v2 = Object.values(groups).flatMap(g=>g.variantes).find(vv => vv.taille===d.taille && (vv.nom===d.nom||vv.sku.includes(d.taille)));
      const scanned = v2 ? (v2.qty_pos||0) : 0;
      const attenduV = v2 ? (v2.attendu||0) : 0;
      const dm = ws.addRow([d.nom, '', d.taille||'—', '', attenduV, scanned, '', d.manque, '']);
      ws.mergeCells(dm.number, 1, dm.number, 2);
      ws.mergeCells(dm.number, 3, dm.number, 4);
      ws.mergeCells(dm.number, 7, dm.number, 7);
      dm.height = 16;
      dm.eachCell({includeEmpty:true}, (cell,c) => {
        cell.fill = fillSolid('fff5f5');
        cell.font = fontStyle(C.missFg, c===8, 10);
        cell.border = border('thin');
        cell.alignment = {horizontal: c===1?'left':'center', vertical:'middle'};
      });
    });
  }

  if (detailSurplus.length > 0) {
    ws.addRow([]);
    const dsTitle = ws.addRow(['  DETAIL — ARTICLES EN SURPLUS PAR VARIANTE']);
    ws.mergeCells(dsTitle.number, 1, dsTitle.number, 9);
    dsTitle.height = 20;
    dsTitle.getCell(1).fill = fillSolid(C.surpBg);
    dsTitle.getCell(1).font = fontStyle(C.surpFg, true, 11);
    dsTitle.getCell(1).border = border('medium');
    dsTitle.getCell(1).alignment = {horizontal:'left', vertical:'middle'};
    const dsHdr = ws.addRow(['Produit', '', 'Variante / Taille', '', 'Attendu', 'Scanne', '', 'Surplus', '']);
    dsHdr.height = 16; applyRow(dsHdr, C.subBg, C.subFg, true, 10, true);
    detailSurplus.forEach(d => {
      const v2 = Object.values(groups).flatMap(g=>g.variantes).find(vv => vv.taille===d.taille && (vv.nom===d.nom||vv.sku.includes(d.taille)));
      const scanned = v2 ? (v2.qty_pos||0) : 0;
      const attenduV = v2 ? (v2.attendu||0) : 0;
      const ds = ws.addRow([d.nom, '', d.taille||'—', '', attenduV, scanned, '', d.surplus, '']);
      ws.mergeCells(ds.number, 1, ds.number, 2);
      ws.mergeCells(ds.number, 3, ds.number, 4);
      ds.height = 16;
      ds.eachCell({includeEmpty:true}, (cell,c) => {
        cell.fill = fillSolid('fffbeb');
        cell.font = fontStyle(C.surpFg, c===8, 10);
        cell.border = border('thin');
        cell.alignment = {horizontal: c===1?'left':'center', vertical:'middle'};
      });
    });
  }

  // ── FEUILLE NON ATTENDUS ──
  const nonAttendu = scans.filter(sc => pl.length>0 && !pl.find(p=>p.sku===sc.sku) && (sc.qty_pos||0)>0);
  if (nonAttendu.length) {
    const ws2 = wb.addWorksheet((_sheetBase+' - Non attendus').substring(0,31), {views:[{showGridLines:false}]});
    ws2.columns = [{width:28},{width:12},{width:22},{width:16}];
    const t2 = ws2.addRow(['Articles non attendus (hors packing list)']);
    ws2.mergeCells(1,1,1,4); t2.height=22;
    t2.getCell(1).fill=fillSolid(C.surpBg); t2.getCell(1).font=fontStyle(C.surpFg,true,12);
    t2.getCell(1).border=border('medium'); t2.getCell(1).alignment={horizontal:'center',vertical:'middle'};
    const h2=ws2.addRow(['Produit','Taille','SKU','Quantite scannee']);
    h2.height=18; applyRow(h2,C.subBg,C.subFg,true,11,true);
    nonAttendu.forEach(sc => {
      const taille = getTailleFromSku(sc.sku, sc.taille);
      const r=ws2.addRow([sc.nom||sc.sku, taille, sc.sku, sc.qty_pos]);
      r.height=18; applyRow(r,C.surpBg,C.surpFg,false,11,false);
      r.getCell(3).alignment={horizontal:'center',vertical:'middle'};
      r.getCell(4).alignment={horizontal:'center',vertical:'middle'};
    });
  }

  // ── FEUILLE DÉFECTUEUX ──
  const defSession = S.defectueux.filter(d=>d.session_id===session.id);
  if (defSession.length) {
    const ws3 = wb.addWorksheet((_sheetBase+' - Def').substring(0,31), {views:[{showGridLines:false}]});
    ws3.columns = [{width:28},{width:12},{width:22},{width:18},{width:30},{width:16}];
    const t3=ws3.addRow(['Articles defectueux']);
    ws3.mergeCells(1,1,1,6); t3.height=22;
    t3.getCell(1).fill=fillSolid(C.missBg); t3.getCell(1).font=fontStyle(C.missFg,true,12);
    t3.getCell(1).border=border('medium'); t3.getCell(1).alignment={horizontal:'center',vertical:'middle'};
    const h3=ws3.addRow(['Produit','Taille','SKU','Type de defaut','Note','Date']);
    h3.height=18; applyRow(h3,C.subBg,C.subFg,true,11,true);
    defSession.forEach(d=>{
      const cat=S.catalogue.find(c=>c.sku===d.sku);
      const taille=getTailleFromSku(d.sku, cat?.taille);
      const r=ws3.addRow([d.nom||d.sku, taille, d.sku, d.type_defaut, d.note||'', new Date(d.created_at).toLocaleDateString('fr-FR')]);
      r.height=18; applyRow(r,C.missBg,C.missFg,false,11,false);

  // ── FEUILLE PACKING LIST (référence) ──
  if (pl.length > 0) {
    const ws4 = wb.addWorksheet((_sheetBase+' - PL').substring(0,31), {views:[{showGridLines:false}]});
    ws4.columns = [{width:28},{width:12},{width:22},{width:12}];
    const t4=ws4.addRow(['Packing list de reference — ' + session.nom]);
    ws4.mergeCells(1,1,1,4); t4.height=22;
    t4.getCell(1).fill=fillSolid(C.headerBg); t4.getCell(1).font=fontStyle(C.headerFg,true,12);
    t4.getCell(1).border=border('medium'); t4.getCell(1).alignment={horizontal:'center',vertical:'middle'};
    const h4=ws4.addRow(['Produit','Taille','SKU','Attendu']);
    h4.height=18; applyRow(h4,C.subBg,C.subFg,true,11,true);
    pl.forEach(p=>{
      const taille=getTailleFromSku(p.sku, p.taille);
      const r=ws4.addRow([p.nom||p.sku, taille, p.sku, p.attendu||1]);
      r.height=18;
      r.eachCell({includeEmpty:true}, (cell,c) => {
        cell.fill=fillSolid(C.infoBg); cell.font=fontStyle('334155',false,11);
        cell.border=border('thin'); cell.alignment={horizontal:c>=3?'center':'left',vertical:'middle'};
      });

    // Total PL
    const plTot=ws4.addRow(['TOTAL ATTENDU','','',{formula:'SUM(D3:D'+ws4.lastRow.number+')'}]);
    ws4.mergeCells(plTot.number,1,plTot.number,3); plTot.height=20;
    applyRow(plTot,C.totalBg,C.totalFg,true,11,true);
  }

}

async function exportExcelSession(session, scans, pl) {
  // Récupérer la PL depuis localStorage ou état courant
  if (!pl || pl.length === 0) {
    try { const raw = localStorage.getItem('pl_' + session.id); if (raw) pl = JSON.parse(raw); } catch(e) {}
  }
  if (!pl || pl.length === 0) pl = S.packingList || [];
  const wb = new ExcelJS.Workbook();
  wb.creator = 'Stock-Logistique';
  wb.created = new Date();
  await addSessionToWorkbook(wb, session, scans, pl);
  const buf = await wb.xlsx.writeBuffer();
  const blob = new Blob([buf], {type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'Stock-Logistique_'+session.nom.replace(/[^a-zA-Z0-9]/g,'_')+'_'+new Date().toISOString().split('T')[0]+'.xlsx';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

// ── H HELPER ──────────────────────────────────────────────────────────────
function h(tag, attrs, ...kids) {
  attrs = attrs || {};
  const el = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs)) {
    if (k === 'class') el.className = v;
    else if (k === 'html') el.innerHTML = v;
    else if (k === 'style') el.style.cssText = v;
    else if (k.startsWith('on') && typeof v === 'function') el.addEventListener(k.slice(2).toLowerCase(), v);
    else if (v !== false && v != null) el.setAttribute(k, v);
  }
  for (const kid of kids.flat()) {
    if (kid == null || kid === false) continue;
    el.appendChild(typeof kid === 'string' || typeof kid === 'number' ? document.createTextNode(kid) : kid);
  }
  return el;
}

// ── CSV PARSER ────────────────────────────────────────────────────────────
function parseCSV(str) {
  const rows = []; let row = []; let field = ''; let inQ = false;
  for (let i = 0; i < str.length; i++) {
    const c = str[i], n = str[i + 1];
    if (inQ) { if (c === '"' && n === '"') { field += '"'; i++; } else if (c === '"') inQ = false; else field += c; }
    else if (c === '"') inQ = true;
    else if (c === ',') { row.push(field); field = ''; }
    else if (c === '\n' || (c === '\r' && n === '\n')) { row.push(field); rows.push(row); row = []; field = ''; if (c === '\r') i++; }
    else field += c;
  }
  if (field || row.length) { row.push(field); rows.push(row); }
  return rows;
}
