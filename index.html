    )
  ) : null;

  const sidebar = h('div', {class: 'scanner-sidebar'},
    h('div', {class: 'sb-section'},
      h('div', {class: 'sb-label'}, 'Mode de session'),
      h('div', {class: 'mode-grid'},
        ...MODES.map(m => h('button', {
          class: 'mode-btn' + (mode === m.id ? ' active' : ''),
          onClick: () => { if (!session) set({mode: m.id}); }
        }, h('span', {class: 'mode-icon'}, m.icon), m.label, h('span', {class: 'mode-sub'}, m.sub)))
      )
    ),
    h('div', {class: 'sb-section'},
      h('div', {class: 'sb-label'}, 'Packing List'),
      packingList ?
        h('div', {},
          h('div', {class: 'alert alert-info', style: 'margin-bottom:8px;padding:8px 10px;font-size:12px'},
            '✓ ' + packingList.length + ' refs · ' + packingList.reduce((a, p) => a + (p.attendu || 1), 0) + ' articles'),
          h('div', {style: 'display:flex;gap:6px'},
            h('button', {class: 'btn btn-outline btn-sm', style: 'flex:1', onClick: () => set({mPacking: true, plItems: packingList.map(p => ({...p})), plSearch: '', plSuggest: []})}, '✏ Modifier'),
            h('button', {class: 'btn btn-danger btn-sm', onClick: () => { if (confirm('Réinitialiser ?')) set({packingList: null}); }}, '🔄')
          )
        ) :
        h('button', {class: 'btn btn-outline', style: 'width:100%', onClick: () => set({mPacking: true, plItems: [], plSearch: '', plSuggest: []})}, '📋 Définir une packing list')
    ),
    h('div', {class: 'sb-section'},
      h('div', {class: 'sb-label'}, 'Session'),
      !session ?
        h('div', {class: 'form-row'},
          h('label', {}, 'Nom de la session'),
          h('input', {type: 'text', placeholder: 'Ex: Réception fournisseur avril…',
            style: S.sessionName === '' ? 'border-color:var(--orange)' : '',
            value: S.sessionName, onInput: e => S.sessionName = e.target.value})
        ) :
        h('div', {style: 'font-weight:600;font-size:13px;margin-bottom:10px;color:var(--text)'}, session.nom),
      h('div', {style: 'display:flex;gap:8px'},
        !session ?
          h('button', {class: 'btn btn-primary btn-lg', style: 'flex:1', onClick: startSession}, '▶ Démarrer') :
          h('button', {class: 'btn btn-red-solid btn-lg', style: 'flex:1', onClick: () => set({mConfirmClose: true})}, '■ Terminer')
      )
    ),
    session ? h('div', {class: 'sb-section'},
      h('div', {class: 'scan-zone'},
        h('div', {class: 'scan-zone-label'}, '→ Positionner le curseur ici — scanner avec la scanette'),
        h('input', {
          class: 'scan-input', type: 'text', placeholder: 'Scan ou SKU + Entrée', id: 'scanInput',
          value: S.scanInput,
          onInput: e => S.scanInput = e.target.value,
          onKeydown: e => { if (e.key === 'Enter' && S.scanInput.trim()) doScan(S.scanInput); }
        }),
        h('div', {class: 'scan-btns'},
          h('button', {class: 'btn btn-success btn-sm', style: 'flex:1', onClick: () => { if (S.scanInput.trim()) doScan(S.scanInput, 1); }}, '+1 Entrée'),
          h('button', {class: 'btn btn-danger btn-sm', style: 'flex:1', onClick: () => { if (S.scanInput.trim()) doScan(S.scanInput, -1); }}, '-1 Retour')
        ),
        S.scanFeedback ? h('div', {class: 'scan-feedback ' + S.scanFeedback.type}, S.scanFeedback.msg) : h('div', {class: 'scan-feedback'})
      )
    ) : null,
    h('div', {class: 'sb-section'},
      h('div', {class: 'counters'},
        h('div', {class: 'cbox'}, h('div', {class: 'cbox-val'}, total), h('div', {class: 'cbox-lbl'}, 'Scannés')),
        h('div', {class: 'cbox green'}, h('div', {class: 'cbox-val'}, conformes), h('div', {class: 'cbox-lbl'}, 'Conformes'))
      ),
      h('div', {class: 'counters', style: 'margin-top:6px'},
        h('div', {class: 'cbox red'}, h('div', {class: 'cbox-val'}, manquants), h('div', {class: 'cbox-lbl'}, 'Manquants')),
        h('div', {class: 'cbox orange'}, h('div', {class: 'cbox-val'}, surplus), h('div', {class: 'cbox-lbl'}, 'Surplus'))
      ),
      h('div', {class: 'counters', style: 'margin-top:6px;grid-template-columns:1fr'},
        h('div', {class: 'cbox purple', style: 'cursor:' + (inconnus>0?'pointer':'default'), onClick: () => inconnus>0 ? set({filter:'inconnus'}) : null},
          h('div', {class: 'cbox-val'}, inconnus),
          h('div', {class: 'cbox-lbl'}, '🔍 Inconnus / Non reconnus')
        )
      ),
      // Tableau articles inconnus si il y en a
      (() => {
        const inconsList = S.scans.filter(sc => !S.catalogue.find(p => p.sku === sc.sku) && (sc.qty_pos||0) > 0);
        if (!inconsList.length) return null;
        return h('div', {class: 'sb-section'},
          h('div', {class: 'sb-label', style: 'color:#7c3aed'}, '🔍 Articles inconnus (' + inconsList.length + ')'),
          h('div', {style: 'max-height:160px;overflow-y:auto'},
            ...inconsList.map(sc => h('div', {style: 'display:flex;align-items:center;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border);font-size:12px'},
              h('div', {style: 'flex:1;overflow:hidden'},
                h('div', {style: 'font-family:var(--mono);font-size:11px;color:#7c3aed;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap'}, sc.sku),
              ),
              h('span', {style: 'background:#f5f3ff;color:#7c3aed;border:1px solid #c4b5fd;border-radius:4px;padding:1px 7px;font-weight:700;font-size:12px;flex-shrink:0;margin-left:6px'}, sc.qty_pos)
            ))
          )
        );
      })(),
      session && history.length ? h('button', {class: 'btn btn-ghost btn-sm', style: 'margin-top:8px;width:100%', onClick: undoLast}, '↩ Annuler dernier scan') : null
    ),
    h('div', {class: 'sb-section', style: 'flex:1'},
      h('div', {class: 'sb-label'}, 'Historique'),
      history.length === 0 ? h('div', {style: 'color:var(--muted);font-size:12px;padding:4px 0'}, 'Aucun scan') :
      h('div', {style: 'max-height:180px;overflow-y:auto'},
        ...history.slice(0, 30).map((hi, idx) => h('div', {class: 'hist-item'},
          h('span', {class: 'badge ' + (hi.delta > 0 ? 'badge-green' : 'badge-red'), style: 'min-width:30px;justify-content:center'}, (hi.delta > 0 ? '+' : '') + hi.delta),
          h('span', {style: 'flex:1;font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap'}, hi.nom || hi.sku),
          h('span', {class: 'hist-time'}, hi.time),
          // ⚠ Défectueux — uniquement sur le dernier scan
          idx === 0 ? h('button', {
            class: 'btn btn-ghost btn-sm',
            style: 'font-size:11px;padding:2px 5px;color:var(--orange);flex-shrink:0',
            title: 'Marquer comme défectueux',
            onClick: () => {
              if (confirm('⚠ Marquer "' + (hi.nom || hi.sku) + '" comme défectueux ?\n\nCet article sera ajouté à la liste des défectueux.')) {
                set({mDefect: {sku: hi.sku, nom: hi.nom || hi.sku}});
              }
            }
          }, '⚠') : null,
          // ❌ Supprimer cet événement de l'historique et décrémenter le scan
          h('button', {
            class: 'btn btn-ghost btn-sm',
            style: 'font-size:10px;padding:2px 4px;color:var(--red);flex-shrink:0',
            title: 'Annuler ce scan',
            onClick: () => {
              const sc = S.scans.find(s => s.sku === hi.sku);
              if (sc) {
                if (hi.delta > 0) {
                  const newVal = (sc.qty_pos||0) - hi.delta;
                  if (newVal <= 0 && (sc.qty_neg||0) === 0) {
                    if (sc._dbId) db.from('scans').delete().eq('id', sc._dbId);
                    S.scans = S.scans.filter(s => s.sku !== hi.sku);
                  } else {
                    sc.qty_pos = Math.max(0, newVal);
                    dbUpsertScan(session.id, sc);
                  }
                } else {
                  sc.qty_neg = Math.max(0, (sc.qty_neg||0) - Math.abs(hi.delta));
                  dbUpsertScan(session.id, sc);
                }
              }
              S.history.splice(idx, 1);
              set({scans:[...S.scans], history:[...S.history]});
            }
          }, '✕')
        ))
      )
    )
  );

  const filterLabels = [
    {id: 'tous', label: 'Tous'},
    {id: 'manquants', label: 'Manquants'},
    {id: 'surplus', label: 'Surplus'},
    {id: 'conformes', label: 'Conformes'},
    {id: 'inconnus', label: 'Non attendus'},
  ];

  const topbar = session ?
    h('div', {class: 'main-topbar', style: 'flex-wrap:wrap;gap:8px'},
      h('div', {class: 'sess-info'},
        h('div', {class: 'sess-info-dot'}),
        h('strong', {}, session.nom),
        h('span', {class: 'badge badge-blue'}, MODES.find(m => m.id === session.mode)?.label || session.mode),
        packingList ? h('span', {style: 'font-size:11px;color:var(--muted)'}, '· packing list ' + packingList.length + ' réfs') : null
      ),
      // Barre ajout manuel article
      h('div', {class: 'relative', style: 'flex:1;min-width:200px;max-width:280px'},
        h('input', {
          type: 'text', id: 'scannerAddInput',
          placeholder: '+ Ajouter article (nom ou SKU)…',
          style: 'width:100%;font-size:12px;padding:5px 10px;min-height:30px',
          onInput: e => {
            const val = e.target.value;
            if (!val || val.length < 2) {
              const box = document.getElementById('scannerAddBox');
              if (box) box.style.display = 'none';
              return;
            }
            const q = val.toLowerCase();
            const results = S.catalogue.filter(p =>
              p.nom.toLowerCase().includes(q) || p.sku.toLowerCase().includes(q)
            ).slice(0, 8);
            const box = document.getElementById('scannerAddBox');
            if (!box) return;
            box.innerHTML = '';
            if (results.length > 0) {
              box.style.display = 'block';
              results.forEach(p => {
                const item = h('div', {class: 'suggest-item', onClick: () => {
                  doScan(p.sku, 1);
                  const inp = document.getElementById('scannerAddInput');
                  if (inp) inp.value = '';
                  box.style.display = 'none';
                }},
                  h('div', {style: 'flex:1;min-width:0'},
                    h('div', {style: 'font-weight:500;font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap'}, p.nom),
                    p.taille ? h('span', {style: 'font-size:11px;color:var(--acc);font-weight:600'}, p.taille) : null
                  ),
                  h('span', {style: 'font-family:var(--mono);font-size:10px;color:var(--muted);flex-shrink:0;margin-left:6px'}, p.sku)
                );
                box.appendChild(item);
              });
            } else {
              box.style.display = 'none';
            }
          },
          onKeydown: e => {
            if (e.key === 'Enter') {
              const val = e.target.value.trim().toUpperCase();
              if (!val) return;
              doScan(val, 1);
              e.target.value = '';
              const box = document.getElementById('scannerAddBox');
              if (box) box.style.display = 'none';
            }
            if (e.key === 'Escape') {
              const box = document.getElementById('scannerAddBox');
              if (box) box.style.display = 'none';
            }
          }
        }),
        h('div', {id: 'scannerAddBox', class: 'suggest-box', style: 'display:none'})
      ),
      h('div', {style: 'display:flex;gap:8px;align-items:center'},
        h('div', {class: 'filter-tabs'},
          ...filterLabels.map(f => h('button', {class: 'ftab' + (filter === f.id ? ' active' : ''), onClick: () => set({filter: f.id})}, f.label))
        ),
        h('button', {class: 'btn btn-outline btn-sm', onClick: () => {
          if (S.scans.length > 0) exportExcelSession(session, scans, S.packingList);
        }}, '⬇ Excel')
      )
    ) :
    h('div', {class: 'main-topbar'}, h('span', {style: 'color:var(--muted);font-size:13px'}, 'Aucune session active — démarrez une session dans le panneau gauche'));

  const tbody = rows.length === 0 ?
    h('tbody', {}, h('tr', {}, h('td', {colspan: '8', style: 'text-align:center;padding:3rem;color:var(--muted)'}, session ? 'Aucun scan dans cette session' : 'Aucune session active'))) :
    h('tbody', {}, ...rows.map(row => {
      const net = (row.qty_pos || 0) - (row.qty_neg || 0);
      const attendu = row.attendu || 0;
      const pct = attendu ? Math.min(100, Math.round((row.qty_pos || 0) / attendu * 100)) : 0;
      const ecart = attendu ? (row.qty_pos || 0) - attendu : net;
      const barClass = attendu ? (row.qty_pos === attendu ? 'prog-ok' : row.qty_pos > attendu ? 'prog-over' : 'prog-miss') : 'prog-neutral';
      const ecartClass = ecart === 0 ? 'ecart-ok' : ecart > 0 ? 'ecart-pos' : 'ecart-neg';
      const ecartPrefix = ecart > 0 ? '▲ +' : ecart < 0 ? '▼ ' : '✓ ';
      const isInconnu = !S.catalogue.find(p => p.sku === row.sku);
      const rowClass = isInconnu ? 'row-inconnu' : '';
      // Fonction ajustement rapide inline (avec auto-suppression à 0)
      function quickAdj(sku, delta) {
        if (!session) return;
        if (window._adjPending) return; // éviter double-clic
        window._adjPending = true;
        setTimeout(() => { window._adjPending = false; }, 300);
        let sc = S.scans.find(s => s.sku === sku);
        // Si l'article vient de la packing list mais n'a pas encore été scanné
        if (!sc && delta > 0) {
          const produit = S.catalogue.find(p => p.sku === sku);
          const plItem = S.packingList?.find(p => p.sku === sku);
          sc = {sku, nom: produit?.nom||sku, cat: produit?.categorie||'', taille: produit?.taille||'', qty_pos: 0, qty_neg: 0, attendu: plItem?.attendu||0, _dbId: null};
          S.scans.push(sc);
        }
        if (!sc) return;
        if (delta > 0) {
          sc.qty_pos = (sc.qty_pos||0) + 1;
          dbUpsertScan(session.id, sc);
          set({scans:[...S.scans]});
        } else {
          const newVal = (sc.qty_pos||0) - 1;
          if (newVal <= 0 && (sc.qty_neg||0) === 0) {
            // Supprimer complètement le scan
            if (sc._dbId) db.from('scans').delete().eq('id', sc._dbId);
            S.scans = S.scans.filter(s => s.sku !== sku);
            S.history = S.history.filter(hi2 => hi2.sku !== sku);
            set({scans:[...S.scans], history:[...S.history]});
          } else {
            sc.qty_pos = Math.max(0, newVal);
            dbUpsertScan(session.id, sc);
            set({scans:[...S.scans]});
          }
        }
      }
      // Suppression complète d'un scan
      function deleteScan(sku) {
        if (!session) return;
        const sc = S.scans.find(s => s.sku === sku);
        if (!sc) return;
        if (sc._dbId) db.from('scans').delete().eq('id', sc._dbId);
        S.scans = S.scans.filter(s => s.sku !== sku);
        S.history = S.history.filter(hi2 => hi2.sku !== sku);
        set({scans:[...S.scans], history:[...S.history]});
      }
      return h('tr', {class: rowClass},
        h('td', {}, h('div', {style: 'display:flex;align-items:center;gap:8px'},
          isInconnu ? h('div', {class: 'img-ph', style: 'background:#f5f3ff;border-color:#c4b5fd;color:#7c3aed'}, '🔍') : h('div', {class: 'img-ph'}, '📦'),
          h('div', {},
            h('span', {style: 'font-weight:500;color:' + (isInconnu?'#7c3aed':'var(--text)')}, row.nom || row.sku),
            isInconnu ? h('div', {style: 'font-size:10px;color:#7c3aed;font-weight:500'}, '⚠ SKU non reconnu') : null
          )
        )),
        h('td', {}, h('span', {class: 'sku-badge', style: isInconnu?'border-color:#c4b5fd;color:#7c3aed':''}, row.sku)),
        h('td', {}, row.cat ? h('span', {class: 'cat-chip'}, row.cat) : h('span', {style: 'color:var(--muted)'}, '—')),
        h('td', {}, row.taille ? h('span', {class: 'taille-chip'}, row.taille) : h('span', {style: 'color:var(--muted)'}, '—')),
        h('td', {style: 'text-align:center;font-family:var(--mono);font-weight:600'}, attendu || '—'),
        h('td', {},
          h('div', {class: 'inline-qty'},
            session ? h('button', {class: 'iqty-btn', style: 'color:var(--red)', onClick: () => quickAdj(row.sku, -1)}, '−') : null,
            h('input', {
              type: 'number', min: '0',
              style: 'width:48px;text-align:center;font-family:var(--mono);font-weight:700;font-size:13px;padding:2px 4px;min-height:26px;border:1px solid var(--border2);border-radius:4px',
              value: row.qty_pos || 0,
              onChange: e => {
                if (!session) return;
                const val = Math.max(0, parseInt(e.target.value) || 0);
                const sc = S.scans.find(s => s.sku === row.sku);
                if (sc) { sc.qty_pos = val; dbUpsertScan(session.id, sc); set({scans:[...S.scans]}); }
              }
            }),
            session ? h('button', {class: 'iqty-btn', style: 'color:var(--green)', onClick: () => quickAdj(row.sku, 1)}, '+') : null,
            (row.qty_neg||0) > 0 ? h('span', {style: 'color:var(--red);font-size:11px;margin-left:2px'}, '-'+(row.qty_neg||0)) : null
          )
        ),
        h('td', {},
          attendu ? h('div', {style: 'display:flex;align-items:center;gap:6px'},
            h('div', {class: 'prog-wrap'}, h('div', {class: 'prog-fill ' + barClass, style: 'width:' + pct + '%'})),
            h('span', {style: 'font-size:11px;color:var(--muted);min-width:28px'}, pct + '%')
          ) : h('span', {style: 'color:var(--muted);font-size:12px'}, '—')
        ),
        h('td', {},
          h('div', {style: 'display:flex;align-items:center;gap:4px'},
            h('span', {class: 'ecart-badge ' + ecartClass}, ecartPrefix + Math.abs(ecart)),
            session ? h('button', {class: 'btn btn-ghost btn-sm', style: 'font-size:11px;padding:2px 6px',
              onClick: () => set({mDefect: {sku: row.sku, nom: row.nom || row.sku}})}, '⚠') : null,
            session ? h('button', {class: 'btn btn-ghost btn-sm', style: 'font-size:11px;padding:2px 6px',
              onClick: () => set({mEditScan: {...row}})}, '✏') : null,
            session ? h('button', {class: 'btn btn-ghost btn-sm', style: 'font-size:11px;padding:2px 6px;color:var(--red)',
              title: 'Supprimer ce scan',
              onClick: () => {
                if (confirm('Supprimer ce scan de la session ?\nIl sera retiré du comptage et de l\'export Excel.'))
                  deleteScan(row.sku);
              }}, '❌') : null
          )
        )
      );
    }));

  const main = h('div', {class: 'scanner-main'},
    plBanner,
    topbar,
    h('div', {class: 'scan-table-wrap'},
      h('table', {class: 'scan-table'},
        h('thead', {}, h('tr', {},
          h('th', {}, 'ARTICLE'), h('th', {}, 'SKU'), h('th', {}, 'CATÉGORIE'),
          h('th', {}, 'TAILLE'), h('th', {}, 'ATTENDU'), h('th', {}, 'SCANNÉ'),
          h('th', {}, 'PROGRESSION'), h('th', {}, 'ÉCART')
        )),
        tbody
      )
    )
  );

  return h('div', {class: 'page'}, h('div', {class: 'scanner-wrap'}, sidebar, main));
}


function renderSessionsList(container) {
  const filtered = S.sessions.filter(s => !S.searchSess || s.nom.toLowerCase().includes(S.searchSess.toLowerCase()));
  container.innerHTML = '';
  if (filtered.length === 0) {
    const empty = h('div', {class: 'empty'}, h('div', {class: 'empty-icon'}, '📁'), h('div', {}, 'Aucune session'));
    container.appendChild(empty);
    return;
  }
  filtered.forEach(s => {
    const scans = s.scans || [];
    const totalPos = scans.reduce((a, sc) => a + (sc.qty_pos || 0), 0);
    const totalNeg = scans.reduce((a, sc) => a + (sc.qty_neg || 0), 0);
    const expanded = S.expandedSession === s.id;
    const card = h('div', {class: 'sess-card'},
      h('div', {class: 'sess-card-hd', onClick: () => set({expandedSession: expanded ? null : s.id})},
        h('div', {style: 'flex:1'},
          h('div', {class: 'sess-card-name'}, s.nom),
          h('div', {style: 'display:flex;gap:6px;align-items:center;margin-top:4px;flex-wrap:wrap'},
            h('span', {class: 'badge ' + (s.status === 'active' ? 'badge-green' : s.status === 'paused' ? 'badge-yellow' : 'badge-gray')}, s.status === 'active' ? '● Actif' : s.status === 'paused' ? '⏸ En pause' : 'Clôturé'),
            h('span', {class: 'badge badge-blue'}, MODES.find(m => m.id === s.mode)?.label || s.mode || '—'),
            h('span', {style: 'font-size:12px;color:var(--muted)'}, new Date(s.created_at).toLocaleDateString('fr-FR'))
          )
        ),
        h('div', {style: 'display:flex;gap:6px;align-items:center'},
          h('span', {class: 'badge badge-green'}, '+' + totalPos),
          h('span', {class: 'badge badge-red'}, '-' + totalNeg),
          s.status === 'paused' ? h('button', {class: 'btn btn-success btn-sm', onClick: async e => {
            e.stopPropagation();
            await dbResumeSession(s.id);
            // Recharger les scans et reprendre la session
            // Fusionner les doublons de SKU (race condition possible lors des quickAdj)
            const _merged1 = {};
            (s.scans || []).forEach(sc => {
              if (_merged1[sc.sku]) {
                _merged1[sc.sku].qty_pos = (_merged1[sc.sku].qty_pos||0) + (sc.qty_pos||0);
                _merged1[sc.sku].qty_neg = (_merged1[sc.sku].qty_neg||0) + (sc.qty_neg||0);
              } else { _merged1[sc.sku] = {...sc, _dbId: sc.id}; }
            });
            const scansData = Object.values(_merged1);
            set({page: 'scanner', session: {...s, status: 'active'}, scans: scansData, history: [], packingList: null});
          }}, '▶ Reprendre') : null,
          h('button', {class: 'btn btn-outline btn-sm', onClick: e => { e.stopPropagation(); exportExcelSession(s, scans, null); }}, '⬇'),
          h('button', {class: 'btn btn-danger btn-sm', onClick: async e => {
            e.stopPropagation();
            const msg = s.status === 'active' ? 'Supprimer cette session active ?' : 'Supprimer cette session ?';
            if (confirm(msg + '\n\n' + s.nom)) { await dbDeleteSession(s.id); loadSessions(); }
          }}, '🗑'),
          h('span', {style: 'color:var(--muted)'}, expanded ? '▲' : '▼')
        )
      )
    );
    container.appendChild(card);
  });
}

function renderSessions() {
  const filtered = S.sessions.filter(s => !S.searchSess || s.nom.toLowerCase().includes(S.searchSess.toLowerCase()));
  const folders = S.folders || [];
  // Sessions sans dossier
  const allFolderSessionIds = folders.flatMap(f => f.sessionIds);
  const sessionsHorsDossier = filtered.filter(s => !allFolderSessionIds.includes(s.id));

  return h('div', {class: 'page'},
    h('div', {class: 'page-hd'},
      h('h2', {}, '📁 Sessions'),
      h('div', {style: 'display:flex;gap:8px;align-items:center'},
        h('input', {type: 'text', placeholder: 'Rechercher…', style: 'width:200px', id: 'searchSessInput',
          value: S.searchSess,
          onInput: e => {
            S.searchSess = e.target.value;
            const list = document.getElementById('sessList');
            if (list) renderSessionsList(list);
          }
        }),
        h('button', {class: 'btn btn-primary btn-sm', onClick: () => set({mNewFolder: true})}, '📁 Nouveau dossier'),
        h('button', {class: 'btn btn-outline btn-sm', onClick: () => { loadSessions().then(exportExcelAll); }}, '⬇ Export tout')
      )
    ),
    S.loadingSess ? h('div', {class: 'loading'}, h('div', {class: 'spinner'}), 'Chargement…') :
    h('div', {class: 'page-body', style: 'padding:16px 20px', id: 'sessList'},
      // ── Dossiers ──
      ...folders.map(folder => {
        const folderSessions = S.sessions.filter(s => folder.sessionIds.includes(s.id));
        const folderOpen = S.expandedFolder === folder.id;
        return h('div', {style: 'margin-bottom:12px'},
          // En-tête dossier
          h('div', {style: 'display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--surface);border:2px solid var(--acc-light);border-radius:var(--radius-lg);cursor:pointer',
            onClick: () => set({expandedFolder: folderOpen ? null : folder.id})},
            h('span', {style: 'font-size:16px'}, '📁'),
            h('span', {style: 'font-weight:700;font-size:14px;flex:1;color:var(--acc)'}, folder.nom),
            h('span', {style: 'font-size:12px;color:var(--muted)'}, folderSessions.length + ' session' + (folderSessions.length!==1?'s':'')),
            h('button', {class: 'btn btn-success btn-sm', onClick: async e => { e.stopPropagation(); await exportExcelFolder(folder); }}, '⬇ Export dossier'),
            h('button', {class: 'btn btn-danger btn-sm', onClick: e => {
              e.stopPropagation();
              if (confirm('Supprimer le dossier "' + folder.nom + '" ? (les sessions ne seront pas supprimées)')) deleteFolder(folder.id);
            }}, '🗑'),
            h('span', {style: 'color:var(--muted);font-size:12px'}, folderOpen ? '▲' : '▼')
          ),
          // Sessions dans le dossier
          folderOpen ? h('div', {style: 'padding-left:16px;margin-top:6px'},
            folderSessions.length === 0 ? h('div', {style: 'color:var(--muted);font-size:13px;padding:12px;text-align:center;border:1px dashed var(--border2);border-radius:var(--radius)'}, 'Aucune session dans ce dossier') :
            h('div', {},
              ...folderSessions.map(s => renderSessCard(s, folder.id))
            )
          ) : null
        );
      }),
      // Séparateur si dossiers + sessions libres
      folders.length > 0 && sessionsHorsDossier.length > 0 ? h('div', {style: 'display:flex;align-items:center;gap:10px;margin:16px 0'},
        h('div', {style: 'flex:1;height:1px;background:var(--border)'}),
        h('span', {style: 'font-size:12px;color:var(--muted);white-space:nowrap'},'Sessions sans dossier'),
        h('div', {style: 'flex:1;height:1px;background:var(--border)'})
      ) : null,
      // Sessions sans dossier
      sessionsHorsDossier.length === 0 && folders.length === 0 ? h('div', {class: 'empty'}, h('div', {class: 'empty-icon'}, '📁'), h('div', {}, 'Aucune session')) :
      h('div', {}, ...sessionsHorsDossier.map(s => renderSessCard(s, null)))
    )
  );
}

// ── Carte session (factorisée) ──
function renderSessCard(s, folderId) {
  const scans = s.scans || [];
  const totalPos = scans.reduce((a, sc) => a + (sc.qty_pos || 0), 0);
  const totalNeg = scans.reduce((a, sc) => a + (sc.qty_neg || 0), 0);
  const expanded = S.expandedSession === s.id;
  // Liste des dossiers disponibles pour cet ajout
  const folders2 = S.folders || [];
  return h('div', {class: 'sess-card'},
          h('div', {class: 'sess-card-hd', onClick: () => set({expandedSession: expanded ? null : s.id})},
            h('div', {style: 'flex:1'},
              h('div', {style: 'display:flex;align-items:center;gap:6px'},
                h('div', {class: 'sess-card-name'}, s.nom),
                h('button', {class: 'btn btn-ghost btn-sm', style: 'padding:2px 6px;font-size:11px;color:var(--muted)',
                  title: 'Renommer la session',
                  onClick: e => { e.stopPropagation(); set({mEditSessionName: {id: s.id, nom: s.nom}}); }
                }, '✏')
              ),
              (() => {
                const note = getSessionNote(s.id);
                return h('div', {style: 'display:flex;align-items:center;gap:4px;margin-top:3px'},
                  note ? h('span', {style: 'font-size:11px;color:var(--muted);font-style:italic;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap'}, '📝 ' + note) : null,
                  h('button', {class: 'btn btn-ghost btn-sm', style: 'padding:1px 5px;font-size:10px;color:var(--muted)',
                    onClick: e => { e.stopPropagation(); set({mEditSessionNote: {sessionId: s.id, note: getSessionNote(s.id)}}); }
                  }, note ? '✏' : '+ Note')
                );
              })(),
              h('div', {style: 'display:flex;gap:6px;align-items:center;margin-top:4px;flex-wrap:wrap'},
                h('span', {class: 'badge ' + (s.status === 'active' ? 'badge-green' : s.status === 'paused' ? 'badge-yellow' : 'badge-gray')}, s.status === 'active' ? '● Actif' : s.status === 'paused' ? '⏸ En pause' : 'Clôturé'),
                h('span', {class: 'badge badge-blue'}, MODES.find(m => m.id === s.mode)?.label || s.mode || '—'),
                h('span', {style: 'font-size:12px;color:var(--muted)'}, new Date(s.created_at).toLocaleDateString('fr-FR'))
              )
            ),
            h('div', {style: 'display:flex;gap:6px;align-items:center'},
              h('span', {class: 'badge badge-green'}, '+' + totalPos),
              h('span', {class: 'badge badge-red'}, '-' + totalNeg),
              s.status === 'paused' ? h('button', {class: 'btn btn-success btn-sm', onClick: async e => {
                e.stopPropagation();
                await dbResumeSession(s.id);
                const _merged2 = {};
                (s.scans || []).forEach(sc => {
                  if (_merged2[sc.sku]) {
                    _merged2[sc.sku].qty_pos = (_merged2[sc.sku].qty_pos||0) + (sc.qty_pos||0);
                    _merged2[sc.sku].qty_neg = (_merged2[sc.sku].qty_neg||0) + (sc.qty_neg||0);
                  } else { _merged2[sc.sku] = {...sc, _dbId: sc.id}; }
                });
                const scansData = Object.values(_merged2);
                set({page: 'scanner', session: {...s, status: 'active'}, scans: scansData, history: [], packingList: null});
              }}, '▶ Reprendre') : null,
              h('button', {class: 'btn btn-outline btn-sm', onClick: e => { e.stopPropagation(); exportExcelSession(s, scans, null); }}, '⬇'),
              // Bouton dossier
              folderId ?
                h('button', {class: 'btn btn-ghost btn-sm', style: 'font-size:11px', title: 'Retirer du dossier',
                  onClick: e => { e.stopPropagation(); removeFromFolder(folderId, s.id); }}, '📁✕') :
                folders2.length > 0 ? h('button', {class: 'btn btn-ghost btn-sm', style: 'font-size:11px', title: 'Ajouter à un dossier',
                  onClick: e => { e.stopPropagation(); set({mAddToFolder: {sessionId: s.id}}); }}, '📁+') : null,
              h('button', {class: 'btn btn-danger btn-sm', onClick: async e => {
                e.stopPropagation();
                const msg = s.status === 'active' ? 'Supprimer cette session active ?' : 'Supprimer cette session ?';
                if (confirm(msg + '\n\n' + s.nom)) { await dbDeleteSession(s.id); loadSessions(); }
              }}, '🗑'),
              h('span', {style: 'color:var(--muted)'}, expanded ? '▲' : '▼')
            )
          ),
          expanded ? h('div', {class: 'sess-card-bd'},
            // ── Zone packing list de la session ──
            h('div', {style: 'margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid var(--border)'},
              (() => {
                const sessPlKey = 'pl_' + s.id;
                let sessPL = null;
                try { const raw = localStorage.getItem(sessPlKey); if (raw) sessPL = JSON.parse(raw); } catch(e) {}
                return h('div', {},
                  h('div', {style: 'display:flex;align-items:center;justify-content:space-between;margin-bottom:8px'},
                    h('div', {style: 'font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px'},
                      sessPL ? '📋 Packing list (' + sessPL.length + ' refs — ' + sessPL.reduce((a,p)=>a+(p.attendu||0),0) + ' articles)' : '📋 Packing list — non définie'
                    ),
                    h('div', {style: 'display:flex;gap:6px'},
                      sessPL ? h('button', {class: 'btn btn-danger btn-sm', onClick: e => {
                        e.stopPropagation();
                        if (confirm('Supprimer la packing list de cette session ?')) {
                          localStorage.removeItem(sessPlKey);
                          set({expandedSession: S.expandedSession}); // forcer re-render
                        }
                      }}, '🗑 Effacer') : null,
                      h('button', {class: 'btn btn-outline btn-sm', onClick: e => {
                        e.stopPropagation();
                        // Ouvrir un textarea pour saisir la packing list
                        set({mSessPL: {sessionId: s.id, key: sessPlKey, current: sessPL}});
                      }}, sessPL ? '✏ Modifier' : '+ Définir')
                    )
                  ),
                  sessPL && sessPL.length > 0 ? h('div', {style: 'max-height:120px;overflow-y:auto;background:var(--acc-light);border:1px solid #93c5fd;border-radius:var(--radius);padding:6px 10px'},
                    ...sessPL.map(p => h('div', {style: 'display:flex;justify-content:space-between;font-size:12px;padding:2px 0;border-bottom:1px solid #dbeafe'},
                      h('span', {style: 'color:var(--acc);font-weight:500'}, p.nom || p.sku),
                      h('span', {style: 'font-family:var(--mono);font-weight:700;color:var(--acc)'}, p.attendu + ' ex.')
                    ))
                  ) : null
                );
              })()
            ),
            // ── Zone ajout article ──
            h('div', {style: 'margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid var(--border)'},
              h('div', {style: 'font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px'}, '+ Ajouter un article à cette session'),
              h('div', {class: 'relative'},
                h('input', {
                  type: 'text',
                  placeholder: 'Rechercher par nom ou SKU…',
                  id: 'sessAdd_' + s.id,
                  style: 'width:100%',
                  onInput: e => {
                    const val = e.target.value;
                    S.sessAddSearch = {...S.sessAddSearch, [s.id]: val};
                    if (!val || val.length < 2) {
                      S.sessAddSuggest = {...S.sessAddSuggest, [s.id]: []};
                      const box = document.getElementById('sessAddBox_' + s.id);
                      if (box) box.style.display = 'none';
                      return;
                    }
                    const q = val.toLowerCase();
                    const results = S.catalogue.filter(p =>
                      p.nom.toLowerCase().includes(q) || p.sku.toLowerCase().includes(q)
                    ).slice(0, 10);
                    S.sessAddSuggest = {...S.sessAddSuggest, [s.id]: results};
                    // Mettre à jour la boîte sans re-render
                    const box = document.getElementById('sessAddBox_' + s.id);
                    if (!box) return;
                    box.innerHTML = '';
                    if (results.length > 0) {
                      box.style.display = 'block';
                      results.forEach(p => {
                        const item = h('div', {class: 'suggest-item',
                          onClick: async () => {
                            // Ajouter le scan à la session
                            const existing = scans.find(sc => sc.sku === p.sku);
                            if (existing) {
                              // Incrémenter le existant
                              await db.from('scans').update({qty_pos: (existing.qty_pos||0)+1}).eq('id', existing.id);
                            } else {
                              // Créer nouveau scan
                              await db.from('scans').insert({
                                session_id: s.id, sku: p.sku, nom: p.nom,
                                qty_pos: 1, qty_neg: 0
                              });
                            }
                            // Mise à jour immédiate de S.sessions
                            const newData = await db.from('sessions').select('*,scans(*)').eq('id', s.id).single();
                            if (newData.data) {
                              S.sessions = S.sessions.map(sess => sess.id === s.id ? newData.data : sess);
                            }
                            const inp = document.getElementById('sessAdd_' + s.id);
                            if (inp) inp.value = '';
                            box.style.display = 'none';
                            S.sessAddSearch = {...S.sessAddSearch, [s.id]: ''};
                            set({sessions: [...S.sessions]});
                          }
                        },
                          p.image_url ? h('img', {src: p.image_url, style: 'width:26px;height:26px;object-fit:cover;border-radius:4px;flex-shrink:0'}) : h('span', {style: 'font-size:16px'}, '📦'),
                          h('div', {style: 'flex:1;min-width:0'},
                            h('div', {style: 'font-weight:500;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap'}, p.nom),
                            p.taille ? h('span', {style: 'font-size:11px;color:var(--acc);font-weight:600'}, p.taille) : null
                          ),
                          h('span', {class: 'suggest-sku'}, p.sku)
                        );
                        box.appendChild(item);
                      });
                    } else {
                      box.style.display = 'none';
                    }
                  },
                  onKeydown: async e => {
                    // Ajout manuel par SKU direct avec Entrée
                    if (e.key === 'Enter') {
                      const val = e.target.value.trim().toUpperCase();
                      if (!val) return;
                      const p = S.catalogue.find(c => c.sku === val);
                      const existing = scans.find(sc => sc.sku === val);
                      if (existing) {
                        await db.from('scans').update({qty_pos: (existing.qty_pos||0)+1}).eq('id', existing.id);
                      } else {
                        await db.from('scans').insert({
                          session_id: s.id, sku: val, nom: p?.nom||val, qty_pos: 1, qty_neg: 0
                        });
                      }
                      e.target.value = '';
                      const box = document.getElementById('sessAddBox_' + s.id);
                      if (box) box.style.display = 'none';
                      loadSessions();
                    }
                  }
                }),
                h('div', {id: 'sessAddBox_' + s.id, class: 'suggest-box', style: 'display:none'})
              )
            ),
            // ── Résumé visuel PL vs scans en temps réel ──
            (() => {
              let sessPLv = null;
              try { const raw = localStorage.getItem('pl_' + s.id); if (raw) sessPLv = JSON.parse(raw); } catch(e) {}
              if (!sessPLv || !sessPLv.length) return null;
              let conformes = 0, manquants = 0, surplus = 0, totalAttendu = 0, totalScanné = 0;
              const detailsManq = [], detailsSupl = [];
              sessPLv.forEach(pl => {
                const sc = scans.find(sc2 => sc2.sku === pl.sku);
                const scanned = sc ? (sc.qty_pos||0) : 0;
                totalAttendu += pl.attendu;
                totalScanné += scanned;
                const diff = scanned - pl.attendu;
                if (diff === 0) { conformes += pl.attendu; }
                else if (diff > 0) { surplus += diff; detailsSupl.push({nom: pl.nom, taille: pl.taille||'', qty: diff}); }
                else { manquants += Math.abs(diff); detailsManq.push({nom: pl.nom, taille: pl.taille||'', qty: Math.abs(diff)}); }
              });
              scans.forEach(sc2 => {
                if (!sessPLv.find(p => p.sku === sc2.sku) && sc2.qty_pos > 0) surplus += sc2.qty_pos;
              });
              const globOk = manquants === 0 && surplus === 0;
              return h('div', {style: 'background:' + (globOk?'var(--green-light)':'var(--yellow-light)') + ';border:1px solid ' + (globOk?'var(--green-border)':'#fde68a') + ';border-radius:var(--radius);padding:10px 14px;margin-bottom:12px'},
                h('div', {style: 'display:flex;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:' + (globOk?'0':'8px')},
                  h('span', {style: 'font-weight:700;font-size:13px;color:' + (globOk?'var(--green)':'var(--yellow)')}, globOk ? '✓ Tout conforme' : '⚠ Écarts détectés'),
                  h('span', {style: 'font-size:12px;color:var(--green);font-weight:600'}, '✓ ' + conformes + ' art. conformes'),
                  manquants > 0 ? h('span', {style: 'font-size:12px;color:var(--red);font-weight:600'}, '▼ ' + manquants + ' art. manquants') : null,
                  surplus > 0 ? h('span', {style: 'font-size:12px;color:var(--orange);font-weight:600'}, '▲ ' + surplus + ' art. en surplus') : null,
                  h('span', {style: 'font-size:12px;color:var(--muted);margin-left:auto'}, totalScanné + ' / ' + totalAttendu + ' articles')
                ),
                // Détail variantes manquantes
                detailsManq.length > 0 ? h('div', {style: 'display:flex;gap:6px;flex-wrap:wrap;margin-top:4px'},
                  h('span', {style: 'font-size:11px;color:var(--red);font-weight:600;margin-right:4px'}, 'Manque :'),
                  ...detailsManq.map(d => h('span', {style: 'font-size:11px;background:var(--red-light);color:var(--red);border:1px solid var(--red-border);border-radius:4px;padding:1px 7px;font-weight:500'},
                    d.nom + (d.taille?' '+d.taille:'') + ' (' + d.qty + ')'
                  ))
                ) : null,
                // Détail variantes surplus
                detailsSupl.length > 0 ? h('div', {style: 'display:flex;gap:6px;flex-wrap:wrap;margin-top:4px'},
                  h('span', {style: 'font-size:11px;color:var(--orange);font-weight:600;margin-right:4px'}, 'Surplus :'),
                  ...detailsSupl.map(d => h('span', {style: 'font-size:11px;background:var(--orange-light);color:var(--orange);border:1px solid var(--orange-border);border-radius:4px;padding:1px 7px;font-weight:500'},
                    d.nom + (d.taille?' '+d.taille:'') + ' (+' + d.qty + ')'
                  ))
                ) : null
              );
            })(),
            scans.length === 0 ? h('div', {style: 'color:var(--muted);font-size:13px;text-align:center;padding:1rem'}, 'Aucun scan') :
            h('div', {style: 'overflow-x:auto'},
              h('table', {class: 'tbl', style: 'border-collapse:collapse'},
                h('thead', {}, h('tr', {},
                  h('th', {}, 'Produit / Variante'), h('th', {}, 'SKU'), h('th', {}, 'Taille'), h('th', {}, 'Entrées +'), h('th', {}, 'Sorties -'), h('th', {}, 'Écart / Actions')
                )),
                h('tbody', {}, ...(() => {
                  // Grouper les scans par nom produit
                  const grps = {};
                  scans.forEach(sc => {
                    const key = sc.nom || sc.sku;
                    if (!grps[key]) grps[key] = {nom: key, variantes: []};
                    grps[key].variantes.push(sc);
                  });
                  return Object.values(grps).flatMap(g => {
                    const tPos = g.variantes.reduce((a, v) => a + (v.qty_pos || 0), 0);
                    const tNeg = g.variantes.reduce((a, v) => a + (v.qty_neg || 0), 0);
                    const tNet = tPos - tNeg;
                    const gKey = 'sess_' + s.id + '_' + g.nom;
                    const open = S.expandedGroups[gKey] !== false;
                    const toggle = () => { const eg = {...S.expandedGroups}; eg[gKey] = !open; set({expandedGroups: eg}); };
                    return [
                      // Ligne groupe
                      h('tr', {onClick: toggle, style: 'cursor:pointer'},
                        h('td', {colspan: '6', class: 'group-hd'},
                          h('span', {style: 'flex:1'}, g.nom),
                          h('span', {class: 'group-total', style: 'color:var(--green)'}, '+' + tPos),
                          h('span', {class: 'group-total', style: 'color:var(--red);margin-left:8px'}, '-' + tNeg),
                          h('span', {class: 'group-total', style: 'color:' + (tNet >= 0 ? 'var(--green)' : 'var(--red)') + ';margin-left:8px'}, (tNet >= 0 ? '+' : '') + tNet),
                          h('span', {class: 'group-arrow'}, open ? '▲' : '▼')
                        )
                      ),
                      // Lignes variantes
                      ...(!open ? [] : g.variantes.map(sc => {
                        const net = (sc.qty_pos || 0) - (sc.qty_neg || 0);
                        return h('tr', {class: 'group-variant'},
                          h('td', {style: 'padding-left:28px;color:var(--text2)'}, '↳ ' + (sc.taille ? sc.nom + ' ' + sc.taille : sc.nom || sc.sku)),
                          h('td', {}, h('span', {class: 'sku-badge'}, sc.sku)),
                          h('td', {}, sc.taille ? h('span', {class: 'taille-chip'}, sc.taille) : '—'),
                          h('td', {}, h('span', {style: 'color:var(--green);font-weight:600'}, '+' + (sc.qty_pos || 0))),
                          h('td', {}, h('span', {style: 'color:var(--red);font-weight:600'}, '-' + (sc.qty_neg || 0))),
                          h('td', {},
                            h('div', {style: 'display:flex;align-items:center;gap:6px'},
                              h('span', {style: 'font-weight:700;color:' + (net >= 0 ? 'var(--green)' : 'var(--red)')}, (net >= 0 ? '+' : '') + net),
                              h('button', {class: 'btn btn-ghost btn-sm', style: 'padding:2px 5px;font-size:11px;color:var(--acc)',
                                title: 'Modifier ce scan',
                                onClick: e => { e.stopPropagation(); set({mEditSessionScan: {scan: {...sc}, sessionId: s.id}}); }
                              }, '✏'),
                              h('button', {class: 'btn btn-ghost btn-sm', style: 'padding:2px 5px;font-size:11px;color:var(--red)',
                                title: 'Supprimer ce scan',
                                onClick: async e => {
                                  e.stopPropagation();
                                  if (confirm('Supprimer ' + (sc.nom||sc.sku) + ' de cette session ?')) {
                                    if (sc.id) await dbDeleteScan(sc.id);
                                    loadSessions();
                                  }
                                }
                              }, '🗑')
                            )
                          )
                        );
                      }))
                    ];
                  });
                })())
              )
            )
          ) : null
  );
}

function renderDefectueux() {
  return h('div', {class: 'page'},
    h('div', {class: 'page-hd'},
      h('h2', {}, '⚠ Défectueux'),
      h('div', {style: 'display:flex;gap:8px'},
        h('button', {class: 'btn btn-warn btn-sm', onClick: () => set({mDefect: {sku: '', nom: ''}})}, '+ Signaler'),
        h('button', {class: 'btn btn-outline btn-sm', onClick: exportExcelAll}, '⬇ Export')

function renderModalPacking() {
  if (!S.mPacking) return null;

  // Mise à jour des suggestions SANS re-render (évite la perte de focus)
  function updateSuggest(val) {
    S.plSearch = val;
    if (!val || val.length < 2) {
      S.plSuggest = [];
    } else {
      const q = val.toLowerCase();
      S.plSuggest = S.catalogue.filter(p => p.nom.toLowerCase().includes(q) || p.sku.toLowerCase().includes(q)).slice(0, 12);
    }
    // Mettre à jour uniquement la boîte de suggestions dans le DOM
    const box = document.getElementById('plSuggestBox');
    if (!box) return;
    box.innerHTML = '';
    if (S.plSuggest.length > 0) {
      box.style.display = 'block';
      S.plSuggest.forEach(p => {
        const item = h('div', {class: 'suggest-item', onClick: () => addItem(p)},
          p.image_url ? h('img', {src: p.image_url, style: 'width:28px;height:28px;object-fit:cover;border-radius:4px;flex-shrink:0'}) : h('span', {style: 'font-size:18px'}, '📦'),
          h('div', {style: 'flex:1;min-width:0'},
            h('div', {style: 'font-weight:500;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap'}, p.nom),
            p.taille ? h('span', {style: 'font-size:11px;color:var(--acc);font-weight:600'}, p.taille) : null
          ),
          h('span', {class: 'suggest-sku'}, p.sku)
        );
        box.appendChild(item);
      });
    } else {
      box.style.display = 'none';
    }
  }

  function addItem(produit) {
    const exists = S.plItems.find(i => i.sku === produit.sku);
    if (!exists) {
      S.plItems.push({sku: produit.sku, nom: produit.nom, cat: produit.categorie || '', taille: produit.taille || '', attendu: 1});
    } else {
      exists.attendu = (exists.attendu || 1) + 1;
    }
    S.plSearch = '';
    S.plSuggest = [];
    set({plItems: [...S.plItems]}); // re-render pour afficher la nouvelle ligne
    setTimeout(() => {
      const inp = document.getElementById('plSearchInput');
      if (inp) { inp.value = ''; inp.focus(); }
      const box = document.getElementById('plSuggestBox');
      if (box) box.style.display = 'none';
    }, 20);
  }

  function removeItem(sku) {
    set({plItems: S.plItems.filter(i => i.sku !== sku)});
  }

  const totalItems = S.plItems.reduce((a, p) => a + (p.attendu || 1), 0);

  return h('div', {class: 'modal-overlay', onClick: e => { if (e.target.className === 'modal-overlay') set({mPacking: false, plSearch: '', plSuggest: []}); }},
    h('div', {class: 'modal modal-lg'},
      h('div', {class: 'modal-hd'},
        h('h3', {}, '📋 Configurer la Packing List'),
        h('button', {class: 'modal-close', onClick: () => set({mPacking: false, plSearch: '', plSuggest: []})}, '×')
      ),
      h('div', {class: 'modal-body'},
        h('div', {class: 'alert alert-info'}, 'Liée à la session en cours uniquement — réinitialisée automatiquement à la clôture.'),
        h('div', {class: 'form-row'},
          h('label', {}, 'Rechercher un produit (nom ou SKU)'),
          h('div', {class: 'relative'},
            h('input', {
              type: 'text', id: 'plSearchInput',
              placeholder: 'ex: hoodie noir, CLN-XS-NOIR…',
              onInput: e => updateSuggest(e.target.value),
              onKeydown: e => {
                if (e.key === 'Escape') {
                  S.plSuggest = [];
                  const box = document.getElementById('plSuggestBox');
                  if (box) box.style.display = 'none';
                }
              }
            }),
            h('div', {id: 'plSuggestBox', class: 'suggest-box', style: 'display:none'})
          )
        ),
        S.plItems.length > 0 ? h('div', {},
          h('div', {style: 'display:flex;align-items:center;justify-content:space-between;margin-bottom:10px'},
            h('div', {style: 'font-weight:600;font-size:13px'}, S.plItems.length + ' refs · ' + totalItems + ' articles'),
            h('button', {class: 'btn btn-danger btn-sm', onClick: () => set({plItems: []})}, '🗑 Tout effacer')
          ),
          h('div', {style: 'max-height:260px;overflow-y:auto;border:1px solid var(--border);border-radius:var(--radius);padding:4px 12px'},
            ...S.plItems.map(item => h('div', {class: 'pl-line'},
              h('div', {class: 'pl-line-info'},
                h('div', {class: 'pl-line-nom'}, item.nom || item.sku),
                h('div', {class: 'pl-line-sku'}, item.sku, item.taille ? h('span', {class: 'pl-line-taille'}, item.taille) : null)
              ),
              h('div', {class: 'qty-ctrl'},
                h('input', {
                  type: 'number', class: 'qty-input', min: '1', value: item.attendu || 1,
                  onInput: e => {
                    const val = parseInt(e.target.value) || 1;
                    const it = S.plItems.find(i => i.sku === item.sku);
                    if (it) it.attendu = Math.max(1, val);
                    // Pas de re-render, juste mise à jour silencieuse
                  },
                  onChange: e => {
                    const val = parseInt(e.target.value) || 1;
                    const it = S.plItems.find(i => i.sku === item.sku);
                    if (it) it.attendu = Math.max(1, val);
                  }
                })
              ),
              h('button', {class: 'pl-del', onClick: () => removeItem(item.sku)}, '×')
            ))
          )
        ) : h('div', {style: 'text-align:center;padding:24px;color:var(--muted);font-size:13px;border:1px dashed var(--border2);border-radius:var(--radius)'},
          '🔍 Recherchez des produits ci-dessus pour les ajouter'
        ),
        h('div', {class: 'divider'}),
        h('details', {},
          h('summary', {style: 'cursor:pointer;color:var(--muted);font-size:12px;margin-bottom:8px'}, '▶ Import rapide par texte (SKU;quantité)'),
          h('textarea', {rows: '5', id: 'plText', style: 'font-family:var(--mono);font-size:12px', placeholder: 'CLN-XS-NOIR;5\nHDE-M-BLDY;3\n...'})
        )
      ),
      h('div', {class: 'modal-ft'},
        S.packingList ? h('button', {class: 'btn btn-danger', onClick: () => { if (confirm('Réinitialiser ?')) set({packingList: null, plItems: [], mPacking: false, plSearch: '', plSuggest: []}); }}, '🔄 Réinitialiser') : null,
        h('button', {class: 'btn btn-outline', onClick: () => set({mPacking: false, plSearch: '', plSuggest: []})}, 'Annuler'),
        h('button', {class: 'btn btn-primary', onClick: () => {
          // Récupérer les valeurs des inputs number avant de valider
          document.querySelectorAll('.qty-input').forEach((inp, i) => {
            if (S.plItems[i]) S.plItems[i].attendu = Math.max(1, parseInt(inp.value) || 1);
          });
          let finalItems = [...S.plItems];
          const text = document.getElementById('plText')?.value?.trim();
          if (text) {
            text.split('\n').filter(Boolean).forEach(l => {
              const parts = l.split(/[;,\t]/);
              const sku = parts[0]?.trim().toUpperCase();
              const attendu = parseInt(parts[1]) || 1;
              if (!sku) return;
              const existing = finalItems.find(i => i.sku === sku);
              if (existing) existing.attendu = attendu;
              else {
                const produit = S.catalogue.find(p => p.sku === sku);
                const tailleText = getTailleFromSku(sku, produit?.taille);
                finalItems.push({sku, nom: produit?.nom || sku, cat: produit?.categorie || '', taille: tailleText, attendu});
              }
            });
          }
          if (!finalItems.length) return;
          set({packingList: finalItems, mPacking: false, plSearch: '', plSuggest: [], plItems: []});
        }}, '✓ Activer la packing list')
      )
    )
  );
}

function renderModalCsv() {
  if (!S.mCsv) return null;
  return h('div', {class: 'modal-overlay', onClick: e => { if (e.target.className === 'modal-overlay') set({mCsv: false}); }},
    h('div', {class: 'modal'},
      h('div', {class: 'modal-hd'}, h('h3', {}, '⬆ Import CSV Shopify'), h('button', {class: 'modal-close', onClick: () => set({mCsv: false})}, '×')),
      h('div', {class: 'modal-body'},
        h('div', {class: 'alert alert-info'}, 'Colonnes : Variant SKU, Title, Type, Option1 Value (taille), Image Src. Compatible export Shopify standard.'),
        h('div', {class: 'form-row'}, h('label', {}, 'Fichier CSV'), h('input', {type: 'file', accept: '.csv', id: 'csv-file', style: 'padding:6px'}))
      ),
      h('div', {class: 'modal-ft'},
        h('button', {class: 'btn btn-outline', onClick: () => set({mCsv: false})}, 'Annuler'),
        h('button', {class: 'btn btn-primary', id: 'csv-import-btn', onClick: async () => {
          const btn = document.getElementById('csv-import-btn');
          const file = document.getElementById('csv-file')?.files?.[0];
          if (!file) return alert('Sélectionnez un fichier');
          btn.textContent = 'Import en cours…'; btn.disabled = true;
          const reader = new FileReader();
          reader.onload = async e => {
            try {
              const text = e.target.result;
              const parsed = parseCSV(text);
              if (parsed.length < 2) { btn.textContent = 'Importer'; btn.disabled = false; return alert('CSV vide'); }
              const headers = parsed[0].map(hh => hh.trim().toLowerCase());
              const idx = k => headers.findIndex(hh => hh === k);
              const skuIdx = idx('variant sku') !== -1 ? idx('variant sku') : idx('sku');
              const nomIdx = idx('title') !== -1 ? idx('title') : idx('nom');
              const catIdx = idx('type') !== -1 ? idx('type') : idx('product type');
              const tailleIdx = idx('option1 value') !== -1 ? idx('option1 value') : idx('taille');
              const imgIdx = idx('image src') !== -1 ? idx('image src') : idx('image_url');
              if (skuIdx < 0) { btn.textContent = 'Importer'; btn.disabled = false; return alert('Colonne SKU introuvable'); }
              let lastTitle = '', lastCat = '', lastImg = '';
              const rows = [];
              for (const cols of parsed.slice(1)) {
                const sku = cols[skuIdx]?.trim().toUpperCase();
                if (!sku) continue;
                const title = cols[nomIdx]?.trim();
                const cat = cols[catIdx]?.trim();
                const img = cols[imgIdx]?.trim();
                if (title) lastTitle = title;
                if (cat) lastCat = cat;
                if (img) lastImg = img;
                rows.push({sku, nom: lastTitle, categorie: lastCat || null, taille: cols[tailleIdx]?.trim() || null, image_url: lastImg || null});
              }
              if (!rows.length) { btn.textContent = 'Importer'; btn.disabled = false; return alert('Aucun produit trouvé'); }
              let count = 0;
              for (let i = 0; i < rows.length; i += 50) {
                const batch = rows.slice(i, i + 50);
                const {error} = await db.from('catalogue').upsert(batch, {onConflict: 'sku'});
                if (!error) count += batch.length;
              }
              await loadCatalogue();
              set({mCsv: false});
              alert('✓ ' + count + ' produits importés sur ' + rows.length);
            } catch (err) {
              alert('Erreur import : ' + err.message);
              btn.textContent = 'Importer'; btn.disabled = false;
            }
          };
          reader.readAsText(file, 'UTF-8');
        }}, 'Importer')
      )
    )
  );
}

// ── MODAL PACKING LIST SESSION ────────────────────────────────────────────
function renderModalSessPL() {
  if (!S.mSessPL) return null;
  const {sessionId, key, current} = S.mSessPL;
  const sess = S.sessions.find(s => s.id === sessionId);

  // State local de la modal (items en cours d'édition)
  if (!window._sessPLItems) window._sessPLItems = current ? current.map(p => ({...p})) : [];

  function saveSuggest(val) {
    if (!val || val.length < 2) {
      const box = document.getElementById('sessPLSugBox');
      if (box) box.style.display = 'none';
      return;
    }
    const q = val.toLowerCase();
    const results = S.catalogue.filter(p => p.nom.toLowerCase().includes(q) || p.sku.toLowerCase().includes(q)).slice(0, 10);
    const box = document.getElementById('sessPLSugBox');
    if (!box) return;
    box.innerHTML = '';
    if (results.length > 0) {
      box.style.display = 'block';
      results.forEach(p => {
        const item = h('div', {class: 'suggest-item', onClick: () => {
          const exists = window._sessPLItems.find(i => i.sku === p.sku);
          if (!exists) {
            const taille = getTailleFromSku(p.sku, p.taille);
            window._sessPLItems.push({sku: p.sku, nom: p.nom, taille, cat: p.categorie||'', attendu: 1});
          } else { exists.attendu++; }
          const inp = document.getElementById('sessPLSearch');
          if (inp) inp.value = '';
          box.style.display = 'none';
          renderSessPLList();
        }},
          h('div', {style: 'flex:1;min-width:0'},
            h('div', {style: 'font-weight:500;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap'}, p.nom),
            p.taille ? h('span', {style: 'font-size:11px;color:var(--acc);font-weight:600'}, p.taille) : null
          ),
          h('span', {class: 'suggest-sku'}, p.sku)
        );
        box.appendChild(item);
      });
    } else { box.style.display = 'none'; }
  }

  function renderSessPLList() {
    const container = document.getElementById('sessPLList');
    if (!container) return;
    container.innerHTML = '';
    if (!window._sessPLItems.length) {
      container.appendChild(h('div', {style: 'text-align:center;padding:20px;color:var(--muted);font-size:13px;border:1px dashed var(--border2);border-radius:var(--radius)'}, '🔍 Recherchez des produits ci-dessus'));
      return;
    }
    const total = window._sessPLItems.reduce((a,p) => a+(p.attendu||1), 0);
    container.appendChild(h('div', {style: 'display:flex;justify-content:space-between;margin-bottom:8px'},
      h('span', {style: 'font-weight:600;font-size:13px'}, window._sessPLItems.length + ' refs · ' + total + ' articles'),
      h('button', {class: 'btn btn-danger btn-sm', onClick: () => { window._sessPLItems = []; renderSessPLList(); }}, '🗑 Tout effacer')
    ));
    const listDiv = h('div', {style: 'max-height:280px;overflow-y:auto;border:1px solid var(--border);border-radius:var(--radius);padding:4px 12px'});
    window._sessPLItems.forEach(item => {
      const row = h('div', {class: 'pl-line'},
        h('div', {class: 'pl-line-info'},
          h('div', {class: 'pl-line-nom'}, item.nom || item.sku),
          h('div', {class: 'pl-line-sku'}, item.sku, item.taille ? h('span', {class: 'pl-line-taille'}, item.taille) : null)
        ),
        h('div', {class: 'qty-ctrl'},
          h('input', {
            type: 'number', class: 'qty-input', min: '1', value: item.attendu || 1,
            onInput: e => { item.attendu = Math.max(1, parseInt(e.target.value)||1); },
            onChange: e => { item.attendu = Math.max(1, parseInt(e.target.value)||1); }
          })
        ),
        h('button', {class: 'pl-del', onClick: () => {
          window._sessPLItems = window._sessPLItems.filter(i => i.sku !== item.sku);
          renderSessPLList();
        }}, '×')
      );
      listDiv.appendChild(row);
    });
    container.appendChild(listDiv);
  }

  // Init items à l'ouverture
  setTimeout(() => { renderSessPLList(); document.getElementById('sessPLSearch')?.focus(); }, 30);

  return h('div', {class: 'modal-overlay', onClick: e => { if (e.target.className === 'modal-overlay') { window._sessPLItems = null; set({mSessPL: null}); } }},
    h('div', {class: 'modal modal-lg'},
      h('div', {class: 'modal-hd'},
        h('h3', {}, '📋 Packing list — ' + (sess?.nom || 'Session')),
        h('button', {class: 'modal-close', onClick: () => { window._sessPLItems = null; set({mSessPL: null}); }}, '×')
      ),
      h('div', {class: 'modal-body'},
        // Barre de recherche
        h('div', {class: 'form-row'},
          h('label', {}, 'Rechercher un produit (nom ou SKU)'),
          h('div', {class: 'relative'},
            h('input', {
              type: 'text', id: 'sessPLSearch',
              placeholder: 'ex: hoodie noir, CLN-XS-NOIR…',
              onInput: e => saveSuggest(e.target.value),
              onKeydown: e => { if (e.key === 'Escape') { const b = document.getElementById('sessPLSugBox'); if(b) b.style.display='none'; } }
            }),
            h('div', {id: 'sessPLSugBox', class: 'suggest-box', style: 'display:none'})
          )
        ),
        // Liste items
        h('div', {id: 'sessPLList'}),
        // Import rapide
        h('div', {class: 'divider'}),
        h('details', {},
          h('summary', {style: 'cursor:pointer;color:var(--muted);font-size:12px;margin-bottom:8px'}, '▶ Import rapide par texte (SKU;quantité)'),
          h('textarea', {rows: '4', id: 'sessPLText', style: 'font-family:var(--mono);font-size:12px', placeholder: 'CLN-XS-NOIR;5\nHDE-M-BLDY;3\n...'})
        )
      ),
      h('div', {class: 'modal-ft'},
        current ? h('button', {class: 'btn btn-danger', onClick: () => {
          if (confirm('Supprimer la packing list ?')) {
            localStorage.removeItem(key);
            window._sessPLItems = null;
            set({mSessPL: null, expandedSession: S.expandedSession});
          }
        }}, '🗑 Supprimer') : null,
        h('button', {class: 'btn btn-outline', onClick: () => { window._sessPLItems = null; set({mSessPL: null}); }}, 'Annuler'),
        h('button', {class: 'btn btn-primary', onClick: () => {
          // Récupérer les qtés des inputs number
          document.querySelectorAll('#sessPLList .qty-input').forEach((inp, i) => {
            if (window._sessPLItems[i]) window._sessPLItems[i].attendu = Math.max(1, parseInt(inp.value)||1);
          });
          // Fusionner avec import texte si rempli
          const text = document.getElementById('sessPLText')?.value?.trim();
          if (text) {
            text.split('\n').filter(Boolean).forEach(l => {
              const parts = l.split(/[;,]/);
              const sku = parts[0]?.trim().toUpperCase();
              const attendu = parseInt(parts[1]) || 1;
              if (!sku) return;
              const exists = window._sessPLItems.find(i => i.sku === sku);
              if (exists) { exists.attendu = attendu; }
              else {
                const prod = S.catalogue.find(p => p.sku === sku);
                const tailleImport = getTailleFromSku(sku, prod?.taille);
                window._sessPLItems.push({sku, nom: prod?.nom||sku, taille: tailleImport, cat: prod?.categorie||'', attendu});
              }
            });
          }
          if (!window._sessPLItems.length) return;
          try { localStorage.setItem(key, JSON.stringify(window._sessPLItems)); } catch(e) {}
          window._sessPLItems = null;
          set({mSessPL: null, expandedSession: S.expandedSession});
        }}, '✓ Enregistrer')
      )
    )
  );
}

          h('label', {}, 'Note libre (visible dans l\'historique)'),
          h('textarea', {rows: '4', id: 'sess-note-input', placeholder: 'Ex: Session officielle, Fast test...', html: note || ''})
        )
      ),
      h('div', {class: 'modal-ft'},
        note ? h('button', {class: 'btn btn-danger', onClick: () => {
          saveSessionNote(sessionId, '');
          set({mEditSessionNote: null});
        }}, '🗑 Supprimer') : null,
        h('button', {class: 'btn btn-outline', onClick: () => set({mEditSessionNote: null})}, 'Annuler'),
        h('button', {class: 'btn btn-primary', onClick: () => {
          const val = document.getElementById('sess-note-input')?.value?.trim() || '';
          saveSessionNote(sessionId, val);
          set({mEditSessionNote: null});
        }}, '✓ Enregistrer')
      )
    )
  );
}

// ── RENDER ────────────────────────────────────────────────────────────────
function render() {
  const app = document.getElementById('app');
  if (!app) return;
  // Sauvegarder les positions de scroll avant de reconstruire
  const scrollSave = {};
  ['.page-body', '.scan-table-wrap', '.scanner-sidebar', '.modal-body', '#sessList'].forEach(sel => {
    const el = document.querySelector(sel);
    if (el && el.scrollTop > 0) scrollSave[sel] = el.scrollTop;
  });
  // Sauvegarder le focus actuel
  const focusedId = document.activeElement?.id;
  app.innerHTML = '';
  if (!S.authed) { app.appendChild(renderPin()); setTimeout(() => document.getElementById('pinInput')?.focus(), 50); return; }
  app.appendChild(renderNav());
  let page;
  if (S.page === 'scanner') page = renderScanner();
  else if (S.page === 'sessions') page = renderSessions();
  else if (S.page === 'defectueux') page = renderDefectueux();
  else if (S.page === 'catalogue') page = renderCatalogue();
  if (page) app.appendChild(page);
  [renderModalConfirmClose(), renderModalPacking(), renderModalDefect(), renderModalEditScan(), renderModalEditSessionName(), renderModalEditSessionScan(), renderModalEditSessionNote(), renderModalSessPL(), renderModalNewFolder(), renderModalAddToFolder(), renderModalAddProd(), renderModalCsv()]
    .filter(Boolean).forEach(m => app.appendChild(m));
  if (S.page === 'scanner' && S.session) setTimeout(() => document.getElementById('scanInput')?.focus(), 50);
  // Restaurer les positions de scroll après reconstruction
  requestAnimationFrame(() => {
    Object.entries(scrollSave).forEach(([sel, pos]) => {
      const el = document.querySelector(sel);
      if (el) el.scrollTop = pos;
    });
    // Restaurer le focus si ce n'est pas le scanInput (déjà géré)
    if (focusedId && focusedId !== 'scanInput') {
      const el = document.getElementById(focusedId);
      if (el) el.focus();
    }
  });
}

render();
if (S.authed) { loadCatalogue(); loadSessions(); loadDefectueux(); }

// ── CTRL+Z global ─────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  // Ctrl+Z (ou Cmd+Z sur Mac)
  if ((e.ctrlKey || e.metaKey) && e.key === 'z') {
    // Ne pas intercepter si on est dans un input/textarea (laisser le comportement natif)
    const tag = document.activeElement?.tagName?.toLowerCase();
    if (tag === 'input' || tag === 'textarea') return;
    // Seulement si une session est active et qu'il y a un historique
    if (S.session && S.history.length > 0) {
      e.preventDefault();
      undoLast();
      // Petit feedback visuel
      showToastInconnu('↩ Scan annulé : ' + (S.history[0]?.nom || ''));
    }
  }
});
</script>
